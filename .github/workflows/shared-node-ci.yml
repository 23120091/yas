name: Shared Node Service CI

on:
  workflow_call:
    inputs:
      service_name: { required: true, type: string }
      service_path: { required: true, type: string }
      min_coverage_overall: { required: false, type: number, default: 70 }
      docker_image: { required: false, type: string, default: '' }
    secrets:
      SNYK_TOKEN: { required: true }

jobs:

  build-and-test:
    name: Build & Unit Test (Node)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ Setup Node + cache đúng path
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ inputs.service_path }}/package-lock.json

      # ✅ Install dependencies
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ inputs.service_path }}

      # ✅ Run test + coverage
      - name: Run unit tests
        run: npm test
        working-directory: ${{ inputs.service_path }}

      # ✅ Check coverage >= 70%
      - name: Check coverage threshold
        run: |
          COVERAGE=$(cat ${{ inputs.service_path }}/coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Coverage = $COVERAGE"

          if (( $(echo "$COVERAGE < ${{ inputs.min_coverage_overall }}" | bc -l) )); then
            echo "❌ Coverage is below threshold"
            exit 1
          else
            echo "✅ Coverage passed"
          fi

      # ✅ Build NextJS
      - name: Build app
        run: npm run build
        working-directory: ${{ inputs.service_path }}

      # ✅ Upload artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-build-${{ inputs.service_name }}
          path: ${{ inputs.service_path }}/.next/

  docker-publish:
    name: Docker Publish
    needs: build-and-test
    if: ${{ github.ref == 'refs/heads/main' && inputs.docker_image != '' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker
        uses: docker/build-push-action@v6
        with:
          context: ./${{ inputs.service_path }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}:${{ github.sha }}