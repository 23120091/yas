name: Shared Node Service CI

on:
  workflow_call:
    inputs:
      service_name: { required: true, type: string }
      service_path: { required: true, type: string }
      node_version: { required: false, type: string, default: '20' }
      min_coverage_overall: { required: false, type: number, default: 70 }
      docker_image: { required: false, type: string, default: '' }
    secrets:
      SNYK_TOKEN: { required: true }

jobs:
  gitleaks-scan-service:
    name: Gitleaks Scan Service Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Gitleaks on Service Files
        uses: ./.github/workflows/actions/gitleaks-scan
        with:
          source_path: ${{ inputs.service_path }}

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks-${{ inputs.service_path }}

  snyk-dependency-scan:
    name: Snyk SCA Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Snyk Security Scan
        uses: ./.github/workflows/actions/snyk-security-scan
        with:
          service_path: ${{ inputs.service_path }}
          manifest_file: ${{ inputs.service_path }}/package.json
          snyk_token: ${{ secrets.SNYK_TOKEN }}
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk.sarif

  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    needs: [gitleaks-scan-service, snyk-dependency-scan]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ inputs.service_path }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ inputs.service_path }}

      - name: Run unit tests
        run: npm run test --if-present -- --coverage --coverageReporters=json-summary --passWithNoTests
        working-directory: ${{ inputs.service_path }}

      - name: Check coverage threshold
        run: |
          COVERAGE_FILE="${{ inputs.service_path }}/coverage/coverage-summary.json"
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "No coverage summary found. Skipping threshold check."
            exit 0
          fi

          COVERAGE=$(jq '.total.lines.pct' "$COVERAGE_FILE")
          echo "Coverage = $COVERAGE"

          if (( $(echo "$COVERAGE < ${{ inputs.min_coverage_overall }}" | bc -l) )); then
            echo "❌ Coverage is below threshold"
            exit 1
          else
            echo "✅ Coverage passed"
          fi

      - name: Build app
        run: npm run build --if-present
        working-directory: ${{ inputs.service_path }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ inputs.service_name }}
          path: |
            ${{ inputs.service_path }}/.next/
            ${{ inputs.service_path }}/dist/
          if-no-files-found: ignore

  docker-publish:
    name: Docker Publish
    needs: [build-and-test]
    if: ${{ github.ref == 'refs/heads/main' && inputs.docker_image != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ inputs.service_path }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}:${{ github.sha }}

      - name: Snyk Container Scan
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}:latest
