name: Shared Node Service CI

on:
  workflow_call:
    inputs:
      service_name: { required: true, type: string }
      service_path: { required: true, type: string }

jobs:
  test-only:
    name: Run Unit Tests Only
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ inputs.service_path }}

      - name: Run tests
        run: npm test
        working-directory: ${{ inputs.service_path }}