name: 'Snyk Container Scan & Report'
description: 'Scan container images and report to PR/Security tab'
inputs:
  image_name:
    required: true
    description: 'Full image name with tag (e.g., ghcr.io/owner/repo/image:tag)'
  snyk_token:
    required: true
    description: 'Snyk API token with permissions to test container images'
  github_token:
    required: true
    description: 'GitHub token for posting PR comments and uploading SARIF'

runs:
  using: "composite"
  steps:
    - name: Setup Snyk CLI
      uses: snyk/actions/setup@master

    - name: Snyk Container Scan
      shell: bash
      env:
        SNYK_TOKEN: ${{ inputs.snyk_token }}
      run: |
        # 1. Tạo file JSON để script JS parse
        snyk container test ${{ inputs.image_name }} --json > snyk.json || true
        
        # 2. Tạo file SARIF
        snyk container test ${{ inputs.image_name }} --sarif-file-output=snyk.sarif > snyk_raw.txt || true

        # 3. Dọn dẹp mã màu ANSI cho log thô
        sed 's/\x1b\[[0-9;]*[mGKHF]//g' snyk_raw.txt | tr -d '\r' > snyk_result.txt

        # 4. Kiểm tra và tạo fallback nếu SARIF bị lỗi
        if [ ! -f snyk.sarif ] || [ ! -s snyk.sarif ]; then
          echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"Snyk","version":"1.0.0","rules":[]}},"results":[]}]}' > snyk.sarif
        fi

    - name: Parse Snyk JSON & Post PR Comment
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const fs = require('fs');
          let totalIssues = 0, critical = 0, high = 0, medium = 0, low = 0;
          let targetOS = 'N/A';
          let hasJson = false;

          // Đọc JSON
          if (fs.existsSync('snyk.json')) {
            try {
              const fileContent = fs.readFileSync('snyk.json', 'utf8');
              if (fileContent.trim()) {
                const json = JSON.parse(fileContent);
                const data = Array.isArray(json) ? json[0] : json;
                hasJson = true;

                const vulns = data.vulnerabilities || [];
                totalIssues = vulns.length;
                critical = vulns.filter(v => v.severity === 'critical').length;
                high     = vulns.filter(v => v.severity === 'high').length;
                medium   = vulns.filter(v => v.severity === 'medium').length;
                low      = vulns.filter(v => v.severity === 'low').length;
                targetOS  = data.operatingSystem || 'N/A';
              }
            } catch (e) { console.log("JSON Parse Error: " + e); }
          }

          // Fallback nếu không có JSON
          if (!hasJson) {
            const clean = fs.readFileSync('snyk_result.txt', 'utf8');
            const m = clean.match(/found (\d+) issues/);
            totalIssues = m ? parseInt(m[1]) : (clean.includes('no vulnerable paths found') ? 0 : -1);
          }

          const isClean = totalIssues === 0;
          const statusIcon = isClean ? '🟢' : (critical > 0 ? '🔴' : '🟠');
          const statusBadge = isClean ? '✅ PASSED' : '❌ ACTION REQUIRED';

          const cleanText = fs.readFileSync('snyk_result.txt', 'utf8');
          const upgradeLines = cleanText.split('\n')
            .filter(l => l.toLowerCase().includes('upgrade'))
            .slice(0, 5).join('\n');

          const body = `## ${statusIcon} Snyk Container Scan — ${statusBadge}
          **Image:** \`${{ inputs.image_name }}\` | **OS:** \`${targetOS}\`

          ### Summary
          | Metric | Value |
          | :--- | :--- |
          | Total Vulnerabilities | ${totalIssues} |
          | Critical | ${critical} 🔴 |
          | High | ${high} 🟠 |

          ${!isClean ? `### Recommended fixes\n\`\`\`\n${upgradeLines || 'Check full log below.'}\n\`\`\`` : ''}

          <details><summary>Full scan output</summary>\n\n\`\`\`\n${cleanText.slice(0, 5000)}\n\`\`\`\n</details>`;

          // Logic Upsert Comment (giữ nguyên của bạn)
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const prev = comments.find(c => c.user.type === 'Bot' && c.body.includes('Snyk Container Scan'));
          if (prev) {
            await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: prev.id, body: body });
          } else {
            await github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body: body });
          }

    - name: Upload SARIF to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: snyk.sarif
        category: snyk-container