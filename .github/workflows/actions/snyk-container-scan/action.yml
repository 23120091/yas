name: Snyk Container Scan
description: Run Snyk Container Security Scan
inputs:
  image_name:
    description: 'Full image name to scan (e.g., ghcr.io/user/repo:tag)'
    required: true
  snyk_token:
    description: 'Snyk API Token'
    required: true
runs:
  using: "composite"
  steps:
    - name: Install Snyk CLI
      uses: snyk/actions/setup@master

    - name: Run Snyk Container Scan
      continue-on-error: true
      shell: bash
      env:
        SNYK_TOKEN: ${{ inputs.snyk_token }}
      run: |
        snyk container test ${{ inputs.image_name }} \
          --severity-threshold=high \
          --sarif-file-output=${{ github.workspace }}/snyk.sarif || true

        if [ ! -f "${{ github.workspace }}/snyk.sarif" ]; then
          echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Snyk","rules":[]}},"results":[]}]}' \
            > ${{ github.workspace }}/snyk.sarif
        fi