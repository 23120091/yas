name: 'Snyk Container Scan'
description: 'GitHub Action to scan Docker images with Snyk and upload results to GitHub Security'
inputs:
  image_name:
    required: true
    description: 'Name of the Docker image to scan (e.g., ghcr.io/owner/repo:tag)'
  snyk_token:
    required: true
    description: 'Snyk API token with permissions to perform container scans'

runs:
  using: "composite"
  steps:
    - name: Setup Snyk CLI
      uses: snyk/actions/setup@master

    - name: Run Snyk Scan & Upload SARIF
      uses: snyk/actions/docker@master
      env:
        SNYK_TOKEN: ${{ inputs.snyk_token }}
      with:
        image: ${{ inputs.image_name }}
        args: --file=/dev/null

    - name: Upload SARIF to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: snyk.sarif
        category: snyk-container