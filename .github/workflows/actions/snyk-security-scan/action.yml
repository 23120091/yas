name: Snyk Security Scan
description: Run Snyk Security Scan & Monitor
inputs:
  service_path:
    description: 'Path to the service'
    required: true
  manifest_file:
    description: 'Path to dependency manifest file'
    required: true
  snyk_token:
    description: 'Snyk API Token'
    required: true
  snyk_org:
    description: 'Snyk Organization ID'
    required: true

runs:
  using: "composite"
  steps:
    - name: Install Snyk CLI
      uses: snyk/actions/setup@master

    - name: Run Snyk Security Scan & Monitor
      shell: bash
      env:
        SNYK_TOKEN: ${{ inputs.snyk_token }}
      run: |
        if [ -f "${{ inputs.service_path }}/mvnw" ]; then
          chmod +x ${{ inputs.service_path }}/mvnw
        fi
        
        snyk test \
          --org=${{ inputs.snyk_org }} \
          --file=${{ inputs.manifest_file }} \
          --severity-threshold=high \
          --remote-repo-url=https://github.com/${{ github.repository }} \
          --sarif-file-output=${{ github.workspace }}/snyk.sarif || true

        if [ ! -f "${{ github.workspace }}/snyk.sarif" ]; then
          echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Snyk","rules":[]}},"results":[]}]}' \
            > ${{ github.workspace }}/snyk.sarif
        fi