name: Shared Java Service CI
on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      java_version:
        required: false
        type: string
        default: '25'
      min_coverage_overall:
        required: false
        type: number
        default: 70
      min_coverage_changed:
        required: false
        type: number
        default: 70
      docker_image:
        required: false
        type: string
        default: ''
    secrets:
      SONAR_TOKEN:
        required: true
      SNYK_TOKEN:
        required: true

jobs:
  build-test-and-scan:
    name: Build, Test and Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java, Build and Run Tests
        uses: ./.github/workflows/actions/java-setup-build-test
        with:
          java_version: ${{ inputs.java_version }}
          service_path: ${{ inputs.service_path }}
          service_name: ${{ inputs.service_name }}

      - name: Java Code Quality
        uses: ./.github/workflows/actions/java-static-analysis
        with:
          service_path: ${{ inputs.service_path }}
          service_name: ${{ inputs.service_name }}
          sonar_token: ${{ secrets.SONAR_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          min_coverage_overall: ${{ inputs.min_coverage_overall }}
          min_coverage_changed: ${{ inputs.min_coverage_changed }}

      - name: Snyk Security Scan
        uses: ./.github/workflows/actions/snyk-security-scan
        with:
          service_path: ${{ inputs.service_path }}
          snyk_token: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk Report to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: ${{ github.workspace }}/snyk.sarif

      - name: Upload Java Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service_name }}-java-build-target
          path: ${{ inputs.service_path }}/target/
          retention-days: 90

  docker-publish:
    name: Build Docker Image and Publish to GHCR
    needs: [build-test-and-scan]
    if: ${{ github.ref == 'refs/heads/main' && inputs.docker_image != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download Java Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.service_name }}-java-build-target
          path: ${{ inputs.service_path }}/target/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ inputs.service_path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Snyk Container Scan
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}:latest
          args: --severity-threshold=high