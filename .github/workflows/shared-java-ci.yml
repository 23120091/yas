name: Shared Java Service CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      java_version:
        required: false
        type: string
        default: '25'
      min_coverage_overall:
        required: false
        type: number
        default: 70
      min_coverage_changed:
        required: false
        type: number
        default: 70
      docker_image:
        required: false
        type: string
        default: ''
    secrets:
      SONAR_TOKEN:
        required: true
      SNYK_TOKEN:
        required: true

jobs:
  java-build-and-test:
    name: Java Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: zricethezav/gitleaks-action@v2
        with:
            source: ${{ inputs.service_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/workflows/actions/java-setup-build-test
        with:
          java_version: ${{ inputs.java_version }}
          service_path: ${{ inputs.service_path }}
          service_name: ${{ inputs.service_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service_name }}-java-build-target
          path: ${{ inputs.service_path }}/target/
          retention-days: 90

  java-code-quality:
    name: Java Code Quality
    needs: java-build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.service_name }}-java-build-target
          path: ${{ inputs.service_path }}/target/

      - uses: ./.github/workflows/actions/java-static-analysis
        with:
          service_path: ${{ inputs.service_path }}
          service_name: ${{ inputs.service_name }}
          sonar_token: ${{ secrets.SONAR_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          min_coverage_overall: ${{ inputs.min_coverage_overall }}
          min_coverage_changed: ${{ inputs.min_coverage_changed }}

  snyk-security-scan:
    name: Snyk Security Scan
    needs: java-build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.service_name }}-java-build-target
          path: ${{ inputs.service_path }}/target/

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >-
            --file=${{ inputs.service_path }}/pom.xml
            --severity-threshold=high 

  docker-publish:
    needs: [java-build-and-test, java-code-quality, snyk-security-scan]
    if: ${{ github.ref == 'refs/heads/main' && inputs.docker_image != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.service_name }}-java-build-target
          path: ${{ inputs.service_path }}/target/

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./${{ inputs.service_path }}
          push: true
          tags: ${{ inputs.docker_image }}