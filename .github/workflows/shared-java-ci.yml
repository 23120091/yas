name: Shared Java Service CI Optimized
on:
  workflow_call:
    inputs:
      service_name: { required: true, type: string }
      service_path: { required: true, type: string }
      java_version: { required: false, type: string, default: '25' }
      min_coverage_overall: { required: false, type: number, default: 70 }
      docker_image: { required: false, type: string, default: '' }
    secrets:
      SONAR_TOKEN: { required: true }
      SNYK_TOKEN: { required: true }

jobs:
  gitleak-scan-service:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source ${{ inputs.service_path }} --verbose --no-git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  snyk-dependency-scan:
    name: Snyk SCA Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Snyk Security Scan
        uses: ./.github/workflows/actions/snyk-security-scan
        with:
          service_path: ${{ inputs.service_path }}
          snyk_token: ${{ secrets.SNYK_TOKEN }}
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk.sarif

  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup & Build
        uses: ./.github/workflows/actions/java-setup-build-test
        with:
          java_version: ${{ inputs.java_version }}
          service_path: ${{ inputs.service_path }}
          service_name: ${{ inputs.service_name }}
      
      - name: Java Code Quality
        uses: ./.github/workflows/actions/java-static-analysis
        with:
          service_path: ${{ inputs.service_path }}
          service_name: ${{ inputs.service_name }}
          sonar_token: ${{ secrets.SONAR_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          min_coverage_overall: ${{ inputs.min_coverage_overall }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ inputs.service_name }}
          path: ${{ inputs.service_path }}/target/
          if-no-files-found: error

  docker-publish:
    name: Docker Publish
    needs: [build-and-test]
    if: ${{ github.ref == 'refs/heads/main' && inputs.docker_image != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact-${{ inputs.service_name }}
          path: ${{ inputs.service_path }}/target/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ inputs.service_path }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}:${{ github.sha }}

      - name: Snyk Container Scan
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}:latest