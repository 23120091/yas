name: Shared Java Service CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      java_version:
        required: false
        type: string
        default: '25'
      min_coverage_overall:
        required: false
        type: number
        default: 70
      min_coverage_changed:
        required: false
        type: number
        default: 70
      docker_image:
        required: false
        type: string
        default: ''
    secrets:
      SONAR_TOKEN:
        required: true
      SNYK_TOKEN:
        required: true

jobs:
  # Job tong hop: build, chay test, va phan tich code quality
  build-test-and-scan:
    name: Build, Test and Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java, Build and Run Tests
        uses: ./.github/workflows/actions/java-setup-build-test
        with:
          java_version: "${{ inputs.java_version || '25' }}"
          service_path: ${{ inputs.service_path }}
          service_name: ${{ inputs.service_name }}

      - name: Java Code Quality
        uses: ./.github/workflows/actions/java-static-analysis
        with:
          service_path: ${{ inputs.service_path }}
          service_name: ${{ inputs.service_name }}
          sonar_token: ${{ secrets.SONAR_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          min_coverage_overall: ${{ inputs.min_coverage_overall }}
          min_coverage_changed: ${{ inputs.min_coverage_changed }}

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk Security Scan
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --file=${{ inputs.service_path }}/pom.xml \
            --severity-threshold=high \
            --sarif-file-output=${{ github.workspace }}/snyk.sarif

      - name: Upload Snyk report to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: ${{ github.workspace }}/snyk.sarif

  # Job dong goi Docker image va dua len GHCR tren branch main
  docker-publish:
    name: Build Docker Image and Publish to GHCR
    needs: [build-test-and-scan]
    if: ${{ github.ref == 'refs/heads/main' && inputs.docker_image != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download Java Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.service_name }}-java-build-target
          path: ${{ inputs.service_path }}/target/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ inputs.service_path }}
          push: true
          tags: ${{ inputs.docker_image }}

      - name: Snyk Container Scan
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ inputs.docker_image }}
          args: --severity-threshold=high