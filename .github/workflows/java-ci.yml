name: Java CI Orchestrator

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  workflow_dispatch:

jobs:
  filter-changes:
    runs-on: ubuntu-latest
    outputs:
      root: ${{ steps.filter-root.outputs.root }}
      services: ${{ steps.filter-services.outputs.changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter Root Changes
        uses: dorny/paths-filter@v3
        id: filter-root
        with:
          filters: |
            root:
              - '*'
              - '.*'
              - '.github/workflows/**'

      - name: Filter Service Changes
        uses: dorny/paths-filter@v3
        id: filter-services
        with:
          # Thêm service mới vào danh sách này khi cần
          filters: |
            backoffice: 'order/**'

  # =========================================================
  # JOB 1: XỬ LÝ ROOT FILES
  # =========================================================
  gitleak-scan-root:
    needs: filter-changes
    name: Gitleaks Scan Root Files
    if: ${{ needs.filter-changes.outputs.root == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Target Folder
        run: |
          mkdir -p root_files
          find . -maxdepth 1 -type f -exec cp {} root_files/ \;
        
      - name: Run Gitleaks on Root Files
        run: |
          wget -qO gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz
          ./gitleaks detect --source root_files --config gitleaks.toml --no-git --verbose

  # =========================================================
  # JOB 2: XỬ LÝ DYNAMIC MATRIX CHO SERVICES
  # =========================================================
  services-ci:
    needs: filter-changes
    if: ${{ needs.filter-changes.outputs.services != '[]' && needs.filter-changes.outputs.services != '' }}
    name: CI for ${{ matrix.service }}
    strategy:
      fail-fast: false 
      matrix:
        service: ${{ fromJson(needs.filter-changes.outputs.services) }}
    
    uses: ./.github/workflows/shared-java-ci.yml
    with:
      service_name: ${{ matrix.service }}
      service_path: ${{ matrix.service }}
      java_version: '25'
      min_coverage_overall: 70
      docker_image: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
    secrets: inherit