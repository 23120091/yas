name: Java CI Orchestrator

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      root: ${{ steps.filter.outputs.root }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            root:
              - '*'
              - '.*'
              - '.github/workflows/java-ci.yml'

  gitleak-scan-root:
    needs: changes
    if: ${{ needs.changes.outputs.root == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Target Folder
        run: |
          mkdir -p root_files
          find . -maxdepth 1 -type f -exec cp {} root_files/ \;
        
      - name: Run Gitleaks on Root Files
        run: |
          wget -qO gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz
          ./gitleaks detect --source root_files --config gitleaks.toml --no-git --verbose