name: Release Docker Image and Create GitHub Release

on:
  push:
    tags:
      - '*-*'

jobs:
  build-and-release:
    name: Build, Push and Release
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      packages: write
      checks: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Extract Service Name and Version from Tag
        id: extract
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          SERVICE_PATH=$(echo $TAG_NAME | rev | cut -d'-' -f2- | rev)
          VERSION=$(echo $TAG_NAME | rev | cut -d'-' -f1 | rev)
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "service_path=$SERVICE_PATH" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Java, Build and Run Tests
        uses: ./.github/workflows/actions/java-setup-build-test
        with:
          java_version: '25'
          service_path: ${{ steps.extract.outputs.service_path }}
          service_name: ${{ steps.extract.outputs.service_path }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ steps.extract.outputs.service_path }}
          tags: |
            type=raw,value=${{ steps.extract.outputs.version }}
            type=sha,format=short

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ steps.extract.outputs.service_path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.extract.outputs.tag_name }}
          name: "Release ${{ steps.extract.outputs.service_path }} - ${{ steps.extract.outputs.version }}"
          body: |
            ## Release Info
            - **Service:** `${{ steps.extract.outputs.service_path }}`
            - **Docker Image:** `ghcr.io/${{ github.repository_owner }}/${{ steps.extract.outputs.service_path }}:${{ steps.extract.outputs.version }}`
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
