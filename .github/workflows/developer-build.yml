name: Developer Build (Sandbox Deploy)

# ============================================================================
# Deploy one or more services to sandbox namespace for isolated testing.
# All other services are ExternalName CNAMEs pointing back to the source env.
#
# Actions:
#   deploy  — Build image (if not exists), deploy to sandbox, create ExternalName
#   destroy — Delete only real pods/services, keep ExternalName routes + namespace
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action"
        required: true
        type: choice
        default: "deploy"
        options:
          - deploy
          - destroy
      service_names:
        description: "Service(s) cần test, cách nhau bằng dấu phẩy (vd: payment,storefront-ui)"
        required: false
        type: string
      branch_name:
        description: "Nhánh (branch) chứa mã nguồn mới (để trống nếu dùng image có sẵn)"
        required: false
        type: string
      environment:
        description: "Môi trường gốc để copy config và ExternalName (chỉ hỗ trợ dev)"
        required: false
        type: choice
        default: "dev"
        options:
          - dev

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: 23120091

jobs:
  destroy:
    name: Destroy Sandbox
    if: ${{ inputs.action == 'destroy' }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Delete real pods/services, keep ExternalName + namespace
        run: |
          kubectl delete deployment -n sandbox --all --ignore-not-found
          kubectl delete replicaset -n sandbox --all --ignore-not-found
          kubectl delete pod -n sandbox --all --ignore-not-found
          kubectl delete ingressroute -n sandbox --all --ignore-not-found
          kubectl delete pvc -n sandbox --all --ignore-not-found
          # Xoá các service thật (ClusterIP, NodePort), giữ lại ExternalName
          for svc in $(kubectl get svc -n sandbox -o name 2>/dev/null || true); do
            TYPE=$(kubectl get $svc -n sandbox -o jsonpath='{.spec.type}' 2>/dev/null || true)
            if [ "$TYPE" != "ExternalName" ]; then
              kubectl delete $svc -n sandbox --ignore-not-found
            fi
          done
          echo "## ✅ Sandbox cleaned — ExternalName routes & namespace kept" >> "$GITHUB_STEP_SUMMARY"

  build-and-deploy:
    name: Build & Deploy
    if: ${{ inputs.action == 'deploy' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        run: |
          if [ -z "${{ inputs.service_names }}" ]; then
            echo "ERROR: service_names is required"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Checkout Code (full history for multi-branch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Process & Deploy All Services
        shell: bash
        run: |
          set -euo pipefail

          SERVICES="${{ inputs.service_names }}"
          ENV="dev"
          BRANCH_RAW="${{ inputs.branch_name }}"
          NAMESPACE="sandbox"

          IFS=',' read -ra SVC_LIST <<< "$SERVICES"
          # Parse branch list — nếu chỉ 1 branch thì dùng cho tất cả
          IFS=',' read -ra BRANCH_LIST <<< "$BRANCH_RAW"

          # 1. Tạo namespace + copy config (chỉ làm 1 lần)
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace "$NAMESPACE" istio-injection=enabled --overwrite
          kubectl label namespace "$NAMESPACE" env=sandbox --overwrite
          echo "Đồng bộ cấu hình từ $ENV..."
          for cm in $(kubectl get configmaps -n "$ENV" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null | tr ' ' '\n' | grep -v '^kube-root-ca\\.' || true); do
            kubectl get configmap "$cm" -n "$ENV" -o json | jq 'del(.metadata.namespace,.metadata.resourceVersion,.metadata.uid,.metadata.creationTimestamp,.metadata.ownerReferences)' | kubectl apply -n "$NAMESPACE" -f - || true
          done
          for secret in $(kubectl get secrets -n "$ENV" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null | tr ' ' '\n' | grep '^yas-\|^sh\.helm' || true); do
            kubectl get secret "$secret" -n "$ENV" -o json | jq 'del(.metadata.namespace,.metadata.resourceVersion,.metadata.uid,.metadata.creationTimestamp,.metadata.ownerReferences)' | kubectl apply -n "$NAMESPACE" -f - || true
          done

          # 2. Xử lý từng service
          IDX=0
          for SERVICE in "${SVC_LIST[@]}"; do
            SERVICE=$(echo "$SERVICE" | xargs)  # trim whitespace
            echo ""
            echo "========================================"
            echo " Processing: $SERVICE (index $IDX)"
            echo "========================================"
            
            # Xác định branch cho service này
            if [ ${#BRANCH_LIST[@]} -gt 0 ] && [ -n "${BRANCH_LIST[0]}" ]; then
              if [ ${#BRANCH_LIST[@]} -gt $IDX ] && [ -n "${BRANCH_LIST[$IDX]}" ]; then
                THIS_BRANCH="${BRANCH_LIST[$IDX]}"
              else
                THIS_BRANCH="${BRANCH_LIST[0]}"
              fi
            else
              THIS_BRANCH=""
            fi
            THIS_BRANCH=$(echo "$THIS_BRANCH" | xargs)

            # Xác định TAG
            if [ -n "$THIS_BRANCH" ]; then
              # Checkout branch này để lấy SHA
              git fetch origin "$THIS_BRANCH" 2>/dev/null || true
              git checkout "$THIS_BRANCH" 2>/dev/null || git checkout -b "$THIS_BRANCH" origin/"$THIS_BRANCH" 2>/dev/null || true
              SHA=$(git rev-parse --short=7 HEAD)
              SAFE_BRANCH=$(echo "$THIS_BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')
              TAG="${SAFE_BRANCH}-${SHA}"
            else
              TAG="latest"
            fi

            if [ "$SERVICE" = "storefront-ui" ]; then
              IMAGE_NAME="storefront-ui"
            elif [ "$SERVICE" = "backoffice-ui" ]; then
              IMAGE_NAME="backoffice-ui"
            else
              IMAGE_NAME="$SERVICE"
            fi

            IMAGE="${REGISTRY}/${OWNER}/${IMAGE_NAME}:${TAG}"
            
            # Kiểm tra image đã tồn tại chưa
            echo "Kiểm tra image $IMAGE..."
            if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
              echo "✅ Image đã tồn tại, bỏ qua build."
              NEED_BUILD=false
            else
              echo "⏳ Image chưa có, cần build."
              NEED_BUILD=true
            fi

            if [ "$NEED_BUILD" = true ]; then
              if [ -z "$THIS_BRANCH" ]; then
                echo "ERROR: branch_name required to build new image for $SERVICE"
                exit 1
              fi
              
              # Build Java
              if [ "$SERVICE" != "storefront-ui" ] && [ "$SERVICE" != "backoffice-ui" ]; then
                echo "Building Java JAR..."
                chmod +x mvnw
                ./mvnw clean package -pl "$SERVICE" -am -DskipTests
              fi
              
              # Docker context path
              if [ "$SERVICE" = "storefront-ui" ]; then
                CTX="storefront"
              elif [ "$SERVICE" = "backoffice-ui" ]; then
                CTX="backoffice"
              else
                CTX="$SERVICE"
              fi
              
              echo "Building & pushing Docker image..."
              docker build -t "$IMAGE" "./$CTX"
              docker push "$IMAGE"
            fi

            # Copy configmap riêng của service (nếu có)
            CM_EXISTS=$(kubectl get configmap "${SERVICE}-application-configmap" -n "$ENV" -o name 2>/dev/null || true)
            if [ -n "$CM_EXISTS" ]; then
              kubectl get configmap "${SERVICE}-application-configmap" -n "$ENV" -o json | \
                jq 'del(.metadata.namespace,.metadata.resourceVersion,.metadata.uid,.metadata.creationTimestamp,.metadata.ownerReferences)' | \
                kubectl apply -n "$NAMESPACE" -f - || true
            fi

            # Xoá service cũ, Helm sẽ tạo mới
            kubectl delete service "$SERVICE" -n "$NAMESPACE" --ignore-not-found
            
            # Tạo ExternalName cho tất cả service khác (nếu chưa có)
            ALL_SERVICES="backoffice-bff backoffice-ui cart customer inventory location media order payment payment-paypal product promotion rating recommendation sampledata search storefront-bff storefront-ui tax webhook"
            for svc in $ALL_SERVICES; do
              if [ "$svc" = "$SERVICE" ]; then continue; fi
              if [ "$svc" = "storefront-bff" ] || [ "$svc" = "backoffice-bff" ]; then
                # Luôn xoá và tạo lại BFF service để đảm bảo đúng dạng Service+Endpoints
                kubectl delete service "$svc" -n "$NAMESPACE" --ignore-not-found
                kubectl delete endpoints "$svc" -n "$NAMESPACE" --ignore-not-found
                DEV_IP=$(kubectl get svc "$svc" -n "$ENV" -o jsonpath='{.spec.clusterIP}' 2>/dev/null || true)
                if [ -n "$DEV_IP" ]; then
                  printf 'apiVersion: v1\nkind: Service\nmetadata:\n  name: %s\nspec:\n  ports:\n  - name: http\n    port: 80\n    protocol: TCP\n    targetPort: 80\n---\napiVersion: v1\nkind: Endpoints\nmetadata:\n  name: %s\nsubsets:\n- addresses:\n  - ip: %s\n  ports:\n  - name: http\n    port: 80\n    protocol: TCP\n' "$svc" "$svc" "$DEV_IP" | kubectl apply -n "$NAMESPACE" -f - || true
                else
                  kubectl create service externalname "$svc" -n "$NAMESPACE" --external-name="$svc.$ENV.svc.cluster.local"
                fi
              else
                EXISTING=$(kubectl get service "$svc" -n "$NAMESPACE" -o name 2>/dev/null || true)
                if [ -z "$EXISTING" ]; then
                  kubectl create service externalname "$svc" -n "$NAMESPACE" --external-name="$svc.$ENV.svc.cluster.local"
                fi
              fi
            done

            # Deploy bằng Helm
            if [ "$SERVICE" = "backoffice-ui" ] || [ "$SERVICE" = "storefront-ui" ]; then
              VALUE_KEY="ui"
            else
              VALUE_KEY="backend"
            fi

            helm dependency build "k8s/charts/$SERVICE" || true
            
            EXTRA_ARGS=""
            if [ "$SERVICE" = "storefront-ui" ]; then
              EXTRA_ARGS="--set ui.extraEnvs[0].name=API_BASE_PATH --set ui.extraEnvs[0].value=http://storefront-bff/api"
            elif [ "$SERVICE" = "backoffice-ui" ]; then
              EXTRA_ARGS="--set ui.extraEnvs[0].name=API_BASE_PATH --set ui.extraEnvs[0].value=http://backoffice-bff/api"
            fi

            helm upgrade --install "$SERVICE" "k8s/charts/$SERVICE" \
              --namespace "$NAMESPACE" \
              -f "k8s/env/${ENV}/common-values.yaml" \
              -f "k8s/env/${ENV}/${SERVICE}-values.yaml" \
              --set "${VALUE_KEY}.image.repository=${REGISTRY}/${OWNER}/${IMAGE_NAME}" \
              --set "${VALUE_KEY}.image.tag=${TAG}" \
              --set "${VALUE_KEY}.image.pullPolicy=Always" \
              --set "${VALUE_KEY}.service.type=ClusterIP" \
              --set "${VALUE_KEY}.nodeSelector=null" \
              --set "${VALUE_KEY}.ingress.enabled=false" \
              $EXTRA_ARGS \
              --wait --timeout 5m

            # Tạo IngressRoute cho frontend
            if [ "$SERVICE" = "storefront-ui" ] || [ "$SERVICE" = "backoffice-ui" ]; then
              HOST="${SERVICE}-sandbox.tthong.dev"
              if [ "$SERVICE" = "storefront-ui" ]; then
                BFF_SERVICE="storefront-bff"
              else
                BFF_SERVICE="backoffice-bff"
              fi
              kubectl delete ingressroute "$SERVICE-sandbox" -n "$NAMESPACE" --ignore-not-found
              kubectl delete ingress "$SERVICE-sandbox" -n "$NAMESPACE" --ignore-not-found
              printf 'apiVersion: networking.k8s.io/v1\nkind: Ingress\nmetadata:\n  name: %s-sandbox\n  namespace: %s\nspec:\n  ingressClassName: traefik\n  rules:\n  - host: %s\n    http:\n      paths:\n      - path: /api\n        pathType: Prefix\n        backend:\n          service:\n            name: %s\n            port:\n              number: 80\n      - path: /oauth2\n        pathType: Prefix\n        backend:\n          service:\n            name: %s\n            port:\n              number: 80\n      - path: /login\n        pathType: Prefix\n        backend:\n          service:\n            name: %s\n            port:\n              number: 80\n      - path: /authentication\n        pathType: Prefix\n        backend:\n          service:\n            name: %s\n            port:\n              number: 80\n      - path: /logout\n        pathType: Prefix\n        backend:\n          service:\n            name: %s\n            port:\n              number: 80\n      - path: /\n        pathType: Prefix\n        backend:\n          service:\n            name: %s\n            port:\n              number: 3000\n  tls:\n  - hosts:\n    - %s\n' "$SERVICE" "$NAMESPACE" "$HOST" "$BFF_SERVICE" "$BFF_SERVICE" "$BFF_SERVICE" "$BFF_SERVICE" "$BFF_SERVICE" "$SERVICE" "$HOST" | kubectl apply -n "$NAMESPACE" -f - || true
              echo "🌐 https://$HOST" >> "$GITHUB_STEP_SUMMARY"
            fi

            echo "✅ $SERVICE deployed (image: $IMAGE)"
            IDX=$((IDX + 1))
          done
