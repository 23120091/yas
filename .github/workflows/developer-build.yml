name: Developer Build (Sandbox Deploy)

# ============================================================================
# Mục 4 của đề bài:
# Developer chọn branch riêng cho TỪNG service (mặc định "main" cho service
# không sửa). Workflow sẽ:
#   1. Build + push image cho service nào branch != main (nếu image với tag đó
#      chưa tồn tại trên GHCR — tránh build lại không cần thiết)
#   2. helm upgrade --install toàn bộ 19 service vào namespace "sandbox"
#      (dùng chung 1 namespace, mỗi lần chạy sẽ OVERWRITE — theo yêu cầu của bạn)
#   3. Set Service type=NodePort cho service được test (hoặc tất cả, tùy chọn)
#   4. In ra domain:port để developer add vào /etc/hosts và truy cập
#
# Yêu cầu: kubeconfig của cluster (1 master/1 worker, K3s) lưu trong
# secret KUBE_CONFIG (base64-encoded kubeconfig file).
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      backoffice-bff:
        description: "Branch for backoffice-bff"
        required: false
        default: "main"
        type: string
      backoffice-ui:
        description: "Branch for backoffice-ui"
        required: false
        default: "main"
        type: string
      cart:
        description: "Branch for cart"
        required: false
        default: "main"
        type: string
      customer:
        description: "Branch for customer"
        required: false
        default: "main"
        type: string
      inventory:
        description: "Branch for inventory"
        required: false
        default: "main"
        type: string
      location:
        description: "Branch for location"
        required: false
        default: "main"
        type: string
      media:
        description: "Branch for media"
        required: false
        default: "main"
        type: string
      order:
        description: "Branch for order"
        required: false
        default: "main"
        type: string
      payment:
        description: "Branch for payment"
        required: false
        default: "main"
        type: string
      payment-paypal:
        description: "Branch for payment-paypal"
        required: false
        default: "main"
        type: string
      product:
        description: "Branch for product"
        required: false
        default: "main"
        type: string
      promotion:
        description: "Branch for promotion"
        required: false
        default: "main"
        type: string
      rating:
        description: "Branch for rating"
        required: false
        default: "main"
        type: string
      recommendation:
        description: "Branch for recommendation"
        required: false
        default: "main"
        type: string
      sampledata:
        description: "Branch for sampledata"
        required: false
        default: "main"
        type: string
      search:
        description: "Branch for search"
        required: false
        default: "main"
        type: string
      storefront-bff:
        description: "Branch for storefront-bff"
        required: false
        default: "main"
        type: string
      storefront-ui:
        description: "Branch for storefront-ui"
        required: false
        default: "main"
        type: string
      tax:
        description: "Branch for tax"
        required: false
        default: "main"
        type: string
      webhook:
        description: "Branch for webhook"
        required: false
        default: "main"
        type: string

permissions:
  contents: read
  packages: read

env:
  NAMESPACE: sandbox
  REGISTRY: ghcr.io
  OWNER: 23120091   # repository_owner, matches existing ci.yml image path convention

jobs:
  resolve-tags:
    name: Resolve image tag per service
    runs-on: ubuntu-latest
    outputs:
      tags_json: ${{ steps.resolve.outputs.tags_json }}
      build_matrix: ${{ steps.resolve.outputs.build_matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve branch -> image tag for every service
        id: resolve
        shell: bash
        run: |
          declare -A SERVICES=(
            [backoffice-bff]="${{ inputs['backoffice-bff'] }}"
            [backoffice-ui]="${{ inputs['backoffice-ui'] }}"
            [cart]="${{ inputs.cart }}"
            [customer]="${{ inputs.customer }}"
            [inventory]="${{ inputs.inventory }}"
            [location]="${{ inputs.location }}"
            [media]="${{ inputs.media }}"
            [order]="${{ inputs.order }}"
            [payment]="${{ inputs.payment }}"
            [payment-paypal]="${{ inputs['payment-paypal'] }}"
            [product]="${{ inputs.product }}"
            [promotion]="${{ inputs.promotion }}"
            [rating]="${{ inputs.rating }}"
            [recommendation]="${{ inputs.recommendation }}"
            [sampledata]="${{ inputs.sampledata }}"
            [search]="${{ inputs.search }}"
            [storefront-bff]="${{ inputs['storefront-bff'] }}"
            [storefront-ui]="${{ inputs['storefront-ui'] }}"
            [tax]="${{ inputs.tax }}"
            [webhook]="${{ inputs.webhook }}"
          )

          echo "{" > tags.json
          echo "[" > build_matrix.json
          first=true
          first_build=true
          for svc in "${!SERVICES[@]}"; do
            branch="${SERVICES[$svc]}"
            if [ "$branch" = "main" ] || [ -z "$branch" ]; then
              tag="latest"
            else
              # Get the latest commit SHA on that branch from the remote
              sha=$(git ls-remote origin "refs/heads/$branch" | cut -f1 | cut -c1-7)
              if [ -z "$sha" ]; then
                echo "::error::Branch '$branch' not found for service '$svc'"
                exit 1
              fi
              safe_branch=$(echo "$branch" | sed 's/[^a-zA-Z0-9._-]/-/g')
              tag="${safe_branch}-${sha}"
              
              if [ "$first_build" = true ]; then first_build=false; else echo "," >> build_matrix.json; fi
              printf '{"name":"%s","branch":"%s","tag":"%s"}' "$svc" "$branch" "$tag" >> build_matrix.json
            fi

            if [ "$first" = true ]; then first=false; else echo "," >> tags.json; fi
            printf '"%s":"%s"' "$svc" "$tag" >> tags.json
          done
          echo "}" >> tags.json
          echo "]" >> build_matrix.json

          cat tags.json
          echo ""
          cat build_matrix.json
          echo ""
          echo "tags_json=$(cat tags.json | tr -d '\n')" >> "$GITHUB_OUTPUT"
          echo "build_matrix=$(cat build_matrix.json | tr -d '\n')" >> "$GITHUB_OUTPUT"

  build-images:
    name: Build & Push image for ${{ matrix.service.name }}
    needs: resolve-tags
    if: ${{ needs.resolve-tags.outputs.build_matrix != '[]' && needs.resolve-tags.outputs.build_matrix != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.resolve-tags.outputs.build_matrix) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.service.branch }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 25
        if: ${{ matrix.service.name != 'storefront-ui' && matrix.service.name != 'backoffice-ui' }}
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Java JAR
        if: ${{ matrix.service.name != 'storefront-ui' && matrix.service.name != 'backoffice-ui' }}
        run: |
          ./mvnw clean package -pl ${{ matrix.service.name }} -am -DskipTests

      - name: Set Docker Build Context Path
        id: context
        run: |
          if [ "${{ matrix.service.name }}" = "storefront-ui" ]; then
            echo "path=storefront" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.service.name }}" = "backoffice-ui" ]; then
            echo "path=backoffice" >> "$GITHUB_OUTPUT"
          else
            echo "path=${{ matrix.service.name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ steps.context.outputs.path }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.service.name }}:${{ matrix.service.tag }}

  deploy-sandbox:
    name: Deploy sandbox namespace
    needs: [resolve-tags, build-images]
    if: always() && (needs.build-images.result == 'success' || needs.build-images.result == 'skipped') && needs.resolve-tags.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Build helm dependencies and deploy each service
        shell: bash
        run: |  
          TAGS_JSON='${{ needs.resolve-tags.outputs.tags_json }}'
          echo "Resolved tags: $TAGS_JSON"

          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          for svc in backoffice-bff backoffice-ui cart customer inventory location media order payment payment-paypal product promotion rating recommendation sampledata search storefront-bff storefront-ui tax webhook; do
            tag=$(echo "$TAGS_JSON" | jq -r --arg s "$svc" '.[$s]')
            echo "== Deploying $svc with tag=$tag =="

            helm dependency build "k8s/charts/$svc" || true

            # backoffice-ui/storefront-ui use the "ui" base chart key, others use "backend"
            if [ "$svc" = "backoffice-ui" ] || [ "$svc" = "storefront-ui" ]; then
              VALUE_KEY="ui"
            else
              VALUE_KEY="backend"
            fi

            helm upgrade --install "$svc" "k8s/charts/$svc" \
              --namespace "$NAMESPACE" --create-namespace \
              --set "${VALUE_KEY}.image.repository=${REGISTRY}/${OWNER}/${svc}" \
              --set "${VALUE_KEY}.image.tag=${tag}" \
              --set "${VALUE_KEY}.image.pullPolicy=Always" \
              --set "${VALUE_KEY}.service.type=NodePort" \
              --wait --timeout 5m || echo "::warning::Deploy failed for $svc, continuing with others"
          done

      - name: Print access information
        shell: bash
        run: |
          echo "## Sandbox deployed. NodePort access info:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Add these to your /etc/hosts pointing at your K3s worker node IP," >> "$GITHUB_STEP_SUMMARY"
          echo "then access via http://<service>.sandbox.yas.local.com:<nodeport>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '| Service | NodePort |' >> "$GITHUB_STEP_SUMMARY"
          echo '|---|---|' >> "$GITHUB_STEP_SUMMARY"
          for svc in backoffice-bff backoffice-ui cart customer inventory location media order payment payment-paypal product promotion rating recommendation sampledata search storefront-bff storefront-ui tax webhook; do
            PORT=$(kubectl get svc "$svc" -n "$NAMESPACE" -o jsonpath='{.spec.ports[0].nodePort}' 2>/dev/null || echo "n/a")
            echo "| $svc | $PORT |" >> "$GITHUB_STEP_SUMMARY"
          done