name: Developer Build (Sandbox Deploy)

# ============================================================================
# Deploy a single service to sandbox namespace for isolated testing.
# All other services are ExternalName CNAMEs pointing back to the source env.
#
# Actions:
#   deploy  — Build image, deploy to sandbox, create ExternalName routes
#   destroy — Delete the entire sandbox namespace
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action"
        required: true
        type: choice
        default: "deploy"
        options:
          - deploy
          - destroy
      service_name:
        description: "Service cần test (chỉ dùng cho deploy)"
        required: false
        type: choice
        options:
          - backoffice-bff
          - backoffice-ui
          - cart
          - customer
          - inventory
          - location
          - media
          - order
          - payment
          - payment-paypal
          - product
          - promotion
          - rating
          - recommendation
          - sampledata
          - search
          - storefront-bff
          - storefront-ui
          - tax
          - webhook
      branch_name:
        description: "Nhánh (branch) chứa mã nguồn mới (ví dụ: dev_tax_service)"
        required: false
        type: string
      environment:
        description: "Môi trường gốc để copy config và ExternalName"
        required: false
        type: choice
        default: "dev"
        options:
          - dev
          - staging

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: 23120091

jobs:
  destroy:
    name: Destroy Sandbox
    if: ${{ inputs.action == 'destroy' }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Delete sandbox namespace
        run: |
          kubectl delete namespace sandbox --ignore-not-found
          echo "## ✅ Sandbox namespace deleted" >> "$GITHUB_STEP_SUMMARY"

  build-and-deploy:
    name: Build & Deploy ${{ github.event.inputs.service_name }}
    if: ${{ inputs.action == 'deploy' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        run: |
          if [ -z "${{ inputs.service_name }}" ]; then
            echo "ERROR: service_name is required for deploy action"
            exit 1
          fi
          if [ -z "${{ inputs.branch_name }}" ]; then
            echo "ERROR: branch_name is required for deploy action"
            exit 1
          fi

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch_name }}

      - name: Resolve Tag
        id: resolve
        shell: bash
        run: |
          SERVICE="${{ inputs.service_name }}"
          BRANCH="${{ inputs.branch_name }}"
          
          SHA=$(git rev-parse --short=7 HEAD)
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')
          TAG="${SAFE_BRANCH}-${SHA}"
          
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          
          echo "Build tag resolved: $TAG for service $SERVICE"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 25
        if: ${{ inputs.service_name != 'storefront-ui' && inputs.service_name != 'backoffice-ui' }}
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Java JAR
        if: ${{ inputs.service_name != 'storefront-ui' && inputs.service_name != 'backoffice-ui' }}
        run: |
          chmod +x mvnw
          ./mvnw clean package -pl ${{ inputs.service_name }} -am -DskipTests

      - name: Set Docker Context Path
        id: context
        run: |
          if [ "${{ inputs.service_name }}" = "storefront-ui" ]; then
            echo "path=storefront" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.service_name }}" = "backoffice-ui" ]; then
            echo "path=backoffice" >> "$GITHUB_OUTPUT"
          else
            echo "path=${{ inputs.service_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ steps.context.outputs.path }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ inputs.service_name }}:${{ steps.resolve.outputs.tag }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy via Helm to Sandbox Namespace
        shell: bash
        run: |
          SERVICE="${{ steps.resolve.outputs.service }}"
          ENV="${{ inputs.environment }}"
          TAG="${{ steps.resolve.outputs.tag }}"
          NAMESPACE="sandbox"
          
          if [ "$SERVICE" = "backoffice-ui" ] || [ "$SERVICE" = "storefront-ui" ]; then
            VALUE_KEY="ui"
          else
            VALUE_KEY="backend"
          fi
          
          # 1. Tạo namespace sandbox nếu chưa tồn tại
          echo "Khởi tạo namespace $NAMESPACE..."
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          
          # 2. Copy cấu hình và credentials từ namespace gốc sang sandbox
          echo "Đang đồng bộ cấu hình (configmaps/secrets) từ namespace $ENV sang $NAMESPACE..."
          for cm in $(kubectl get configmaps -n "$ENV" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null | tr ' ' '\n' | grep '^yas-'); do
            kubectl get configmap "$cm" -n "$ENV" -o json | jq 'del(.metadata.namespace,.metadata.resourceVersion,.metadata.uid,.metadata.creationTimestamp,.metadata.ownerReferences)' | kubectl apply -n "$NAMESPACE" -f -
          done

          for secret in $(kubectl get secrets -n "$ENV" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null | tr ' ' '\n' | grep '^yas-'); do
            kubectl get secret "$secret" -n "$ENV" -o json | jq 'del(.metadata.namespace,.metadata.resourceVersion,.metadata.uid,.metadata.creationTimestamp,.metadata.ownerReferences)' | kubectl apply -n "$NAMESPACE" -f -
          done
          
          kubectl get configmap "${SERVICE}-application-configmap" -n "$ENV" -o json 2>/dev/null | jq 'del(.metadata.namespace,.metadata.resourceVersion,.metadata.uid,.metadata.creationTimestamp,.metadata.ownerReferences)' | kubectl apply -n "$NAMESPACE" -f - || true
          
          # 3. Tạo ExternalName cho tất cả service — bao gồm cả service đang deploy
          #    (sẽ được real service ghi đè lên ở bước 4)
          echo "Đang thiết lập định tuyến ExternalName liên namespace sang $ENV..."
          ALL_SERVICES="backoffice-bff backoffice-ui cart customer inventory location media order payment payment-paypal product promotion rating recommendation sampledata search storefront-bff storefront-ui tax webhook"
          for svc in $ALL_SERVICES; do
            kubectl delete service "$svc" -n "$NAMESPACE" --ignore-not-found
            kubectl create service externalname "$svc" -n "$NAMESPACE" --external-name="$svc.$ENV.svc.cluster.local"
          done
          
          # 4. Deploy service lên Sandbox bằng Helm (ghi đè real pod + service lên ExternalName)
          echo "Đang build Helm dependencies cho $SERVICE..."
          helm dependency build "k8s/charts/$SERVICE" || true
          
          echo "Đang thực hiện helm upgrade cho $SERVICE..."
          helm upgrade --install "$SERVICE" "k8s/charts/$SERVICE" \
            --namespace "$NAMESPACE" \
            -f "k8s/env/${ENV}/common-values.yaml" \
            -f "k8s/env/${ENV}/${SERVICE}-values.yaml" \
            --set "${VALUE_KEY}.image.repository=${REGISTRY}/${OWNER}/${SERVICE}" \
            --set "${VALUE_KEY}.image.tag=${TAG}" \
            --set "${VALUE_KEY}.image.pullPolicy=Always" \
            --set "${VALUE_KEY}.service.type=ClusterIP" \
            --set "${VALUE_KEY}.nodeSelector=null" \
            --set "${VALUE_KEY}.ingress.enabled=false" \
            --wait --timeout 5m
          
          # 5. Tạo IngressRoute cho frontend sandbox service
          if [ "$SERVICE" = "storefront-ui" ] || [ "$SERVICE" = "backoffice-ui" ]; then
            HOST="${SERVICE}-sandbox.tthong.dev"
            echo "Tạo IngressRoute với host $HOST..."
            kubectl delete ingressroute "$SERVICE-sandbox" -n "$NAMESPACE" --ignore-not-found
            printf 'apiVersion: traefik.io/v1alpha1\nkind: IngressRoute\nmetadata:\n  name: %s-sandbox\nspec:\n  entryPoints:\n    - web\n  routes:\n    - match: Host(\`%s\`)\n      kind: Rule\n      services:\n        - name: %s\n          port: 3000\n' "$SERVICE" "$HOST" "$SERVICE" | kubectl apply -n "$NAMESPACE" -f -
          else
            HOST=""
          fi
            
          # 6. In thông tin truy cập
          echo "## ✅ Đã deploy thành công $SERVICE lên namespace $NAMESPACE!" >> "$GITHUB_STEP_SUMMARY"
          echo "* **Môi trường gốc:** \`$ENV\` (các service liên quan được tự động trỏ chéo sang namespace này)" >> "$GITHUB_STEP_SUMMARY"
          echo "* **Image Tag:** \`$TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$HOST" ]; then
            echo "### 🌐 Cách truy cập test:" >> "$GITHUB_STEP_SUMMARY"
            echo "1. Thêm dòng sau vào file \`hosts\`:" >> "$GITHUB_STEP_SUMMARY"
            echo "   \`<IP_K3S>    $HOST\`" >> "$GITHUB_STEP_SUMMARY"
            echo "2. Truy cập: \`http://$HOST\`" >> "$GITHUB_STEP_SUMMARY"
          fi
