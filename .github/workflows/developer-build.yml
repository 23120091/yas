name: Developer Build (Sandbox Deploy)

# ============================================================================
# Giải pháp Tối ưu: Chạy đè tag tạm thời bằng ArgoCD CLI
# - Nhận đúng 2 tham số: Tên Service và Tên Nhánh.
# - Build và Push Image cho service tương ứng.
# - Dùng lệnh 'argocd app set --core' để ép đổi tag của service đó trên cụm.
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: "Service cần test"
        required: true
        type: choice
        options:
          - backoffice-bff
          - backoffice-ui
          - cart
          - customer
          - inventory
          - location
          - media
          - order
          - payment
          - payment-paypal
          - product
          - promotion
          - rating
          - recommendation
          - sampledata
          - search
          - storefront-bff
          - storefront-ui
          - tax
          - webhook
      branch_name:
        description: "Nhánh (branch) chứa mã nguồn mới (ví dụ: dev_tax_service)"
        required: true
        type: string
      environment:
        description: "Môi trường ArgoCD cần deploy"
        required: false
        type: choice
        default: "dev"
        options:
          - dev
          - staging

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: 23120091

jobs:
  build-and-deploy:
    name: Build & Deploy ${{ github.event.inputs.service_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch_name }}

      - name: Resolve Tag
        id: resolve
        shell: bash
        run: |
          SERVICE="${{ inputs.service_name }}"
          BRANCH="${{ inputs.branch_name }}"
          
          # Lấy 7 ký tự SHA của commit mới nhất
          SHA=$(git rev-parse --short=7 HEAD)
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')
          TAG="${SAFE_BRANCH}-${SHA}"
          
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          
          echo "Build tag resolved: $TAG for service $SERVICE"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 25
        if: ${{ inputs.service_name != 'storefront-ui' && inputs.service_name != 'backoffice-ui' }}
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Java JAR
        if: ${{ inputs.service_name != 'storefront-ui' && inputs.service_name != 'backoffice-ui' }}
        run: |
          chmod +x mvnw
          ./mvnw clean package -pl ${{ inputs.service_name }} -am -DskipTests

      - name: Set Docker Context Path
        id: context
        run: |
          if [ "${{ inputs.service_name }}" = "storefront-ui" ]; then
            echo "path=storefront" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.service_name }}" = "backoffice-ui" ]; then
            echo "path=backoffice" >> "$GITHUB_OUTPUT"
          else
            echo "path=${{ inputs.service_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ steps.context.outputs.path }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ inputs.service_name }}:${{ steps.resolve.outputs.tag }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"



      - name: Override image tag via kubectl patch
        shell: bash
        run: |
          SERVICE="${{ steps.resolve.outputs.service }}"
          ENV="${{ inputs.environment }}"
          APP_NAME="${SERVICE}-${ENV}"
          TAG="${{ steps.resolve.outputs.tag }}"
          
          if [ "$SERVICE" = "backoffice-ui" ] || [ "$SERVICE" = "storefront-ui" ]; then
            VALUE_KEY="ui"
          else
            VALUE_KEY="backend"
          fi
          
          echo "Đang ghi đè tag cho Application: $APP_NAME ..."
          kubectl patch application "$APP_NAME" -n argocd --type merge \
            -p "{\"spec\":{\"source\":{\"helm\":{\"parameters\":[{\"name\":\"${VALUE_KEY}.image.tag\",\"value\":\"${TAG}\"}]}}}}"
          
          echo "## ✅ Đã cập nhật tag cho $APP_NAME!" >> "$GITHUB_STEP_SUMMARY"
          echo "Image Tag mới: \`${TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> 💡 **Cách dọn dẹp (Reset):** Nhấn **Sync** trên ArgoCD UI để đưa service về lại tag mặc định theo Git." >> "$GITHUB_STEP_SUMMARY"