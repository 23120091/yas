write:
  replicas: 1
read:
  replicas: 1
backend:
  replicas: 1
loki:
  commonConfig:
    replication_factor: 1
  auth_enabled: false
  limits_config:
    ingestion_rate_mb: 50
    ingestion_burst_size_mb: 100
    reject_old_samples: false
  
  storage:
    type: 'filesystem'

  storageConfig:
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules
      admin_directory: /var/loki/admin

persistence:
  enabled: true
  size: 10Gi
  accessModes:
    - ReadWriteOnce
  mountPath: /data

extraInitContainers:
  - name: fix-permissions
    image: busybox
    command: ["sh", "-c", "chown -R 10001:10001 /data"]
    volumeMounts:
      - name: storage
        mountPath: /data

minio:
  enabled: false

# ============================================================================
# MEMCACHED — Loki chart 7.0.0 dùng chunksCache / resultsCache
# Default allocatedMemory: 8192 MB (~9GB sau khi chart tính resources)
# ============================================================================
chunksCache:
  enabled: true
  allocatedMemory: 512          # MB (default 8192)
  allocatedCPU: 50m
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      memory: 768Mi

resultsCache:
  enabled: true
  allocatedMemory: 256          # MB (default 1024)
  allocatedCPU: 50m
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 384Mi

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
