write:
  replicas: 1
read:
  replicas: 1
backend:
  replicas: 1

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  pattern_ingester:
    enabled: true

  storage:
    type: 's3'

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h

  storageConfig:
    aws:
      s3: null
      endpoint: http://loki-dev-minio:9000
      bucketnames: loki-data
      access_key_id: minio
      secret_access_key: minio123
      s3forcepathstyle: true
      insecure: true

minio:
  enabled: true
  persistence:
    enabled: true
    size: 10Gi
    accessModes:
      - ReadWriteOnce

chunksCache:
  enabled: true
  allocatedMemory: 512
  allocatedCPU: 50m
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      memory: 768Mi

resultsCache:
  enabled: true
  allocatedMemory: 256
  allocatedCPU: 50m
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 384Mi

monitoring:
  selfMonitoring:
    enabled: false