write:
  replicas: 1
read:
  replicas: 1
backend:
  replicas: 1
loki:
  commonConfig:
    replication_factor: 1
  auth_enabled: false
  storage:
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
test:
  enabled: false
storage:
  type: 'filesystem'
minio:
  enabled: false

# Cap memcached — Loki defaults allocate 11+ Gi per env
memcached:
  chunkCache:
    allocatedMemory: 512
    resources:
      requests:
        cpu: 50m
        memory: 512Mi
      limits:
        memory: 768Mi
  resultsCache:
    allocatedMemory: 256
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 384Mi

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false