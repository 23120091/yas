# ============================================================================
# CLUSTER CONFIGURATION — PRODUCTION ENVIRONMENT
# ============================================================================
# This file provides infrastructure configuration for the PRODUCTION environment.
# All resources are deployed into env-specific namespaces (e.g., postgres-production).
#
# Production is the MOST conservative:
#   - 3 replicas minimum for true HA
#   - Largest volume sizes
#   - Clean domain (no env prefix) — prod owns the primary URLs
# ============================================================================

domain: tthong.dev

# Production uses the clean domain (no subdomain prefix).
# e.g. identity.tthong.dev, not identity.production.tthong.dev
# envSubdomain must NOT be set for production
envSubdomain:

postgresql:
  replicas: 1
  username: yasadminuser
  password: admin
  volumeSize: 50Gi

kafka:
  replicas: 1

zookeeper:
  replicas: 1

elasticsearch:
  replicas: 1
  username: yas
  password: LarUmB3A49NTg9YmgW4=

keycloak:
  bootstrapAdmin:
    username: admin
    password: admin
  backofficeRedirectUrls:
    - http://backoffice.tthong.dev
    - http://backoffice.yas.local.com
  storefrontRedirectUrls:
    - http://storefront.tthong.dev
    - http://storefront.yas.local.com

redis:
  password: redis

# Grafana and Prometheus are NOT deployed (project does not use them).
# Observability stack: Loki + Tempo + Promtail + OpenTelemetry Collector only.
