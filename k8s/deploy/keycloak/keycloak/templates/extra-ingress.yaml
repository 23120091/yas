apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak-extra-ingress
spec:
  ingressClassName: traefik
  rules:
    {{- range .Values.extraHostnames }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak-service
                port:
                  number: 80
    {{- end }}
