# Production environment node affinity
# Pins production infrastructure to the master (control-plane) node
# because master is the most stable (not a spot instance).
# Dev/staging workers are spot instances and may be preempted.
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
