# ============================================================================
# CLUSTER CONFIGURATION — DEV ENVIRONMENT
# ============================================================================
# This file provides infrastructure configuration for the DEV environment.
# All resources are deployed into env-specific namespaces (e.g., postgres-dev).
#
# Resources per env (proper isolation):
#   - PostgreSQL cluster in namespace postgres-dev
#   - Kafka cluster in namespace kafka-dev
#   - Elasticsearch cluster in namespace elasticsearch-dev
#   - Keycloak instance in namespace keycloak-dev
#   - Redis instance in namespace redis-dev
#   - Observability stack in namespace observability-dev
#
# NOTE: Operators (postgres-operator, strimzi, eck, cert-manager,
# opentelemetry-operator, keycloak CRDs) are cluster-scoped and installed
# once. This script handles that via idempotent helm upgrade --install.
# ============================================================================

domain: tthong.dev

# Subdomain prefix for this environment (e.g. identity-dev.tthong.dev)
# Production keeps the clean domain (no prefix).
envSubdomain: dev

postgresql:
  replicas: 1
  username: yasadminuser
  password: admin
  volumeSize: 5Gi

kafka:
  replicas: 1

zookeeper:
  replicas: 1

elasticsearch:
  replicas: 1
  username: yas
  password: LarUmB3A49NTg9YmgW4=

# Credentials for yas-configuration Helm chart (ArgoCD reads this)
credentials:
  elasticsearch:
    username: yas
    password: LarUmB3A49NTg9YmgW4=

keycloak:
  bootstrapAdmin:
    username: admin
    password: admin
  backofficeRedirectUrls:
    - http://backoffice-dev.tthong.dev
    - http://backoffice.dev.yas.local.com
  storefrontRedirectUrls:
    - http://storefront-dev.tthong.dev
    - http://storefront.dev.yas.local.com

redis:
  password: redis

# Grafana and Prometheus are NOT deployed (project does not use them).
# Observability stack: Loki + Tempo + Promtail + OpenTelemetry Collector only.
