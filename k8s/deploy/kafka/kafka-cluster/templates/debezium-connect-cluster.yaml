{{- if .Values.debeziumConnect.legacyLog4jCompatibility.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: debezium-connect-legacy-log4j
data:
  log4j.properties: |
    log4j.rootLogger={{ .Values.debeziumConnect.legacyLog4jCompatibility.rootLogLevel }}, stdout
    log4j.appender.stdout=org.apache.log4j.ConsoleAppender
    log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
    log4j.appender.stdout.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p [%t] %c{1}:%L - %m%n
{{- end }}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaConnect
metadata:
  name: debezium-connect-cluster
  annotations:
    strimzi.io/use-connector-resources: "true"
spec:
  replicas: 1
  bootstrapServers: kafka-cluster-kafka-bootstrap:9092
  groupId: connect-cluster
  configStorageTopic: kafka_connect_configs
  statusStorageTopic: kafka_connect_status
  offsetStorageTopic: kafka_connect_offsets
  image: {{ .Values.debeziumConnect.image }}
  config:
    config.providers: secrets
    config.providers.secrets.class: io.strimzi.kafka.KubernetesSecretConfigProvider
    config.storage.replication.factor: -1
    offset.storage.replication.factor: -1
    status.storage.replication.factor: -1
  {{- if eq .Values.debeziumConnect.buildImage true }}
  build:
    output:
      type: docker
      image: {{ .Values.debeziumConnect.image }}
      pushSecret: {{ .Values.debeziumConnect.build.pushSecret }}
    plugins:
      - name: debezium-postgresql-connector
        artifacts:
          - type: tgz
            url: {{ .Values.debeziumConnect.build.pluginUrl }}
  {{- end }}
  {{- if .Values.debeziumConnect.legacyLog4jCompatibility.enabled }}
  template:
    pod:
      volumes:
        - name: legacy-log4j-config
          configMap:
            name: debezium-connect-legacy-log4j
    connectContainer:
      env:
        - name: KAFKA_CONNECT_BOOTSTRAP_SERVERS
          value: {{ .Values.debeziumConnect.bootstrapServers | default "kafka-cluster-kafka-bootstrap:9092" }}
        - name: KAFKA_CONNECT_GROUP_ID
          value: {{ .Values.debeziumConnect.groupId | default "connect-cluster" }}
        - name: KAFKA_CONNECT_CONFIG_STORAGE_TOPIC
          value: {{ .Values.debeziumConnect.configStorageTopic | default "kafka_connect_configs" }}
        - name: KAFKA_CONNECT_OFFSET_STORAGE_TOPIC
          value: {{ .Values.debeziumConnect.offsetStorageTopic | default "kafka_connect_offsets" }}
        - name: KAFKA_CONNECT_STATUS_STORAGE_TOPIC
          value: {{ .Values.debeziumConnect.statusStorageTopic | default "kafka_connect_status" }}
        - name: KAFKA_CONNECT_KEY_CONVERTER
          value: "org.apache.kafka.connect.json.JsonConverter"
        - name: KAFKA_CONNECT_VALUE_CONVERTER
          value: "org.apache.kafka.connect.json.JsonConverter"
        - name: KAFKA_CONNECT_PLUGIN_PATH
          value: /opt/kafka/plugins
      volumeMounts:
        - name: legacy-log4j-config
          mountPath: /opt/kafka/custom-config/log4j.properties
          subPath: log4j.properties
  {{- end }}
