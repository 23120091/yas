apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka-cluster
spec:
  kafka:
    replicas: {{ .Values.kafka.replicas }}
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
    storage:
      type: persistent-claim
      size: 10Gi
    {{- if or .Values.affinity .Values.nodeSelector }}
    template:
      pod:
        {{- if .Values.affinity }}
        affinity:
          {{- toYaml .Values.affinity | nindent 10 }}
        {{- end }}
        {{- if .Values.nodeSelector }}
        nodeSelector:
          {{- toYaml .Values.nodeSelector | nindent 10 }}
        {{- end }}
    {{- end }}
  zookeeper:
    replicas: {{ .Values.kafka.replicas }}
    storage:
      type: persistent-claim
      size: 10Gi
    {{- if or .Values.affinity .Values.nodeSelector }}
    template:
      pod:
        {{- if .Values.affinity }}
        affinity:
          {{- toYaml .Values.affinity | nindent 10 }}
        {{- end }}
        {{- if .Values.nodeSelector }}
        nodeSelector:
          {{- toYaml .Values.nodeSelector | nindent 10 }}
        {{- end }}
    {{- end }}
  entityOperator:
    topicOperator: {}
    userOperator: {}
    {{- if or .Values.affinity .Values.nodeSelector }}
    template:
      pod:
        {{- if .Values.affinity }}
        affinity:
          {{- toYaml .Values.affinity | nindent 10 }}
        {{- end }}
        {{- if .Values.nodeSelector }}
        nodeSelector:
          {{- toYaml .Values.nodeSelector | nindent 10 }}
        {{- end }}
    {{- end }}
