# ============================================================================
# CLUSTER CONFIGURATION — BASE TEMPLATE
# ============================================================================
# This file is a reference template. Per-environment overrides are in
# cluster-config-{env}.yaml. Passwords are in .env.txt (gitignored).
#
# Usage: source .env.txt && ./setup-cluster.sh <env>
# ============================================================================

domain: tthong.dev

postgresql:
  replicas: 1
  username: yasadminuser
  volumeSize: 5Gi

kafka:
  replicas: 1

zookeeper:
  replicas: 1

elasticsearch:
  replicas: 1
  username: yas
