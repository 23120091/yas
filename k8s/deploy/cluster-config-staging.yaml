# Subdomain prefix for this environment (e.g. identity.staging.yas.local.com)
envSubdomain: staging

postgresql:
  replicas: 2
  username: yasadminuser
  password: admin
  volumeSize: 20Gi

kafka:
  replicas: 3

zookeeper:
  replicas: 3

elasticsearch:
  replicas: 2
  username: yas
  password: LarUmB3A49NTg9YmgW4=

keycloak:
  bootstrapAdmin:
    username: admin
    password: admin
  backofficeRedirectUrl: http://backoffice.staging.yas.local.com
  storefrontRedirectUrl: http://storefront.staging.yas.local.com

redis:
  password: redis

