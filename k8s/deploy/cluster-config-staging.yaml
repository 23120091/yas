# ============================================================================
# CLUSTER CONFIGURATION — STAGING ENVIRONMENT
# ============================================================================
# This file provides infrastructure configuration for the STAGING environment.
# All resources are deployed into env-specific namespaces (e.g., postgres-staging).
#
# Staging mirrors production shape at reduced scale:
#   - 2 replicas for HA validation
#   - Larger volume sizes for realistic data
#   - Same security config as production
# ============================================================================

