backend:
  image:
    repository: ghcr.io/23120091/cart
    tag: 0.5.1
  nameOverride: cart
  fullnameOverride: cart
  databaseName: cart
  ingress:
    enabled: true
    host: api.yas.local
    path: /
  extraVolumes:
    - name: cart-application-config
      configMap:
        name: cart-application-configmap
  extraVolumeMounts:
    - name: cart-application-config
      mountPath: /opt/yas/cart
  extraApplicationConfigPaths:
    - /opt/yas/cart/cart-application.yaml
  resources:
    requests:
      cpu: 50m
      memory: 750Mi
    limits:
      memory: 1Gi
  autoscaling:
    enabled: false 

