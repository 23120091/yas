nameOverride: swagger-ui
fullnameOverride: swagger-ui

nodeSelector:
  env: production

baseUrl: /swagger-ui
urls: "[{ url: 'http://api.yas.local/product/v3/api-docs', name: 'Product' }, { url: 'http://api.yas.local/media/v3/api-docs', name: 'Media' }, { url: 'http://api.yas.local/customer/v3/api-docs', name: 'Customer' }, { url: 'http://api.yas.local/cart/v3/api-docs', name: 'Cart' }, { url: 'http://api.yas.local/rating/v3/api-docs', name: 'Rating' }, { url: 'http://api.yas.local/order/v3/api-docs', name: 'Order' }, { url: 'http://api.yas.local/payment/v3/api-docs', name: 'Payment' }, { url: 'http://api.yas.local/location/v3/api-docs', name: 'Location' }, { url: 'http://api.yas.local/inventory/v3/api-docs', name: 'Inventory' }, { url: 'http://api.yas.local/tax/v3/api-docs', name: 'Tax' }, { url: 'http://api.yas.local/promotion/v3/api-docs', name: 'Promotion' }, { url: 'http://api.yas.local/search/v3/api-docs', name: 'Search' }]"

ingress:
