backend:
  image:
    repository: ghcr.io/23120091/location
    tag: latest
  nameOverride: location
  fullnameOverride: location
  databaseName: location
  ingress:
    enabled: true
    host: api.yas.local
    path: /
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 3000m
      memory: 3Gi
  autoscaling:
    enabled: true
    minReplicas: 5
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60
