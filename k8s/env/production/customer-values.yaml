backend:
  image:
    repository: ghcr.io/23120091/customer
    tag: 0.4.2
  nameOverride: customer
  fullnameOverride: customer
  databaseName: customer
  ingress:
    enabled: true
    host: api.yas.local
    path: /
  extraVolumes:
    - name: customer-application
      configMap:
        name: customer-application-configmap
  extraVolumeMounts:
    - name: customer-application
      mountPath: /opt/yas/customer
  extraApplicationConfigPaths:
    - /opt/yas/customer/customer-application.yaml
  resources:
    requests:
      cpu: 50m
      memory: 900Mi
    limits:
      memory: 1280Mi
  autoscaling:
    enabled: false 

