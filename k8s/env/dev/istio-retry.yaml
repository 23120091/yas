apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: global-services-retry-policy
  namespace: dev
spec:
  hosts:
  - "*" # Áp dụng tổng thể cho tất cả các đường định tuyến nội bộ namespace dev
  http:
  - match:
    - method:
        exact: GET # Tối ưu bảo vệ tài nguyên: Chỉ tự động gọi lại đối với các request đọc dữ liệu
    route:
    - destination:
        host: placeholder # Thừa hưởng host đích từ request gốc
    retries:
      attempts: 2          # Thử lại tối đa 2 lần để tránh gây nghẽn cụm khi service chết thật
      perTryTimeout: 500ms # Thời gian chờ mỗi lượt chỉ 0.5 giây, giải phóng tài nguyên CPU/RAM lập tức
      retryOn: "5xx,connect-failure" # Kích hoạt khi hệ thống trả lỗi 500 hoặc mất kết nối mạng