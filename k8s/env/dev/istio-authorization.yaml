apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-all-by-default
  namespace: dev
spec:
  {} # Bật Zero-Trust: Mặc định khóa toàn bộ kết nối nội bộ namespace dev

---
# TẦNG 1: Mở inbound cho edge BFF từ Traefik/browser path
# Browser traffic does not come from the storefront-ui/backoffice-ui service accounts.
# With namespace-wide deny-all enabled, the BFFs must explicitly allow public ingress.
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-storefront-bff
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: storefront-bff
  rules:
  - to:
    - operation:
        ports: ["80"]

---
# TẦNG 1 (Tiếp theo): Mở inbound cho edge BFF từ Traefik/browser path
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-backoffice-bff
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: backoffice-bff
  rules:
  - to:
    - operation:
        ports: ["80"]

---
# TẦNG 1b: Frontend UI services accept traffic from their respective BFF (mesh)
# deny-all-by-default blocks all, so we need explicit allow for the BFF -> UI direction
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-bff-to-storefront-ui
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: storefront-ui
  rules:
  - from:
    - source:
        principals:
          - "cluster.local/ns/dev/sa/storefront-bff"

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-bff-to-backoffice-ui
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: backoffice-ui
  rules:
  - from:
    - source:
        principals:
          - "cluster.local/ns/dev/sa/backoffice-bff"

---
# TẦNG 2: Bảo vệ 10 Business Services (Chỉ cho phép 2 ông BFF gọi xuống)
# Cấm tuyệt đối các Business Services tự gọi chéo trực tiếp lẫn nhau
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-bff-to-business-services
  namespace: dev
spec:
  selector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - product
          - cart
          - order
          - customer
          - inventory
          - tax
          - media
          - search
          - rating
          - recommendation
  rules:
  - from:
    - source:
        principals: 
          - "cluster.local/ns/dev/sa/storefront-bff"
          - "cluster.local/ns/dev/sa/backoffice-bff"
