backend:
  image:
    repository: ghcr.io/23120091/sampledata
    tag: 0.5.1

  nameOverride: sampledata
  fullnameOverride: sampledata
  databaseName: sampledata
  ingress:
    enabled: true
    host: api.staging.yas.local
    path: /product/
  extraVolumes:
    - name: sampledata-application
      configMap:
        name: sampledata-application-configmap
  extraVolumeMounts:
    - name: sampledata-application
      mountPath: /opt/yas/sampledata
  extraApplicationConfigPaths:
    - /opt/yas/sampledata/sampledata-application.yaml

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 384Mi

  livenessProbe:
    initialDelaySeconds: 180
  readinessProbe:
    initialDelaySeconds: 180
