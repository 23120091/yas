backend:
  image:
    repository: ghcr.io/23120091/media
    tag: 0.4.1

  nameOverride: media
  fullnameOverride: media
  databaseName: media
  ingress:
    enabled: true
    host: api.staging.yas.local
    path: /media/

  # Persistent storage for uploaded images
  persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 10Gi

  initContainers:
    - name: copy-sample-images
      image: ghcr.io/23120091/sampledata:0.5.0
      command: ['sh', '-c', 'mkdir -p /images/sample && cp -r /sample-images/* /images/sample/ 2>/dev/null || true']
      volumeMounts:
        - name: images
          mountPath: /images

  extraVolumes:
    - name: images
      persistentVolumeClaim:
        claimName: media
    - name: media-application
      configMap:
        name: media-application-configmap
  extraVolumeMounts:
    - name: images
      mountPath: /images
    - name: media-application
      mountPath: /opt/yas/media
  extraApplicationConfigPaths:
    - /opt/yas/media/media-application.yaml

  resources:
    requests:
      cpu: 50m      
      memory: 512Mi   
    limits:
      cpu: 1500m      
      memory: 1536Mi
