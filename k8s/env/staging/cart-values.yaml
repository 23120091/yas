backend:
  image:
    repository: ghcr.io/23120091/cart
    tag: 0.5.0
  nameOverride: cart
  fullnameOverride: cart
  databaseName: cart
  ingress:
    enabled: true
    host: api.staging.yas.local
    path: /
  extraVolumes:
    - name: cart-application-config
      configMap:
        name: cart-application-configmap
  extraVolumeMounts:
    - name: cart-application-config
      mountPath: /opt/yas/cart
  extraApplicationConfigPaths:
    - /opt/yas/cart/cart-application.yaml
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1500m
      memory: 1536Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
