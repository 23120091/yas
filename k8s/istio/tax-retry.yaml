apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: tax-retry-policy
  namespace: production
spec:
  hosts:
  - tax.production.svc.cluster.local
  http:
  - route:
    - destination:
        host: tax.production.svc.cluster.local
        port:
          number: 80
          
    # 💥 1. BƠM LỖI GIẢ LẬP: Ép Istio ném lỗi 503 cho 100% request gọi vào tax
    fault:
      abort:
        httpStatus: 503
        percentage:
          value: 100

    retries:
      attempts: 3          # 🔥 Ép Istio tự động thử lại 3 lần chạy ngầm
      perTryTimeout: 500ms # Thời gian chờ giữa mỗi lượt thử là 500ms
      retryOn: "5xx,connect-failure,refused-stream"