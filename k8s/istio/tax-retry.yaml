apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: tax-retry-policy
  namespace: production
spec:
  hosts:
    - tax
  http:
    # ------------------------------------------------------------------
    # TEST MODE — Trỏ đến port 8888 (không tồn tại) để sinh lỗi kết nối thật
    # Retry sẽ chạy vì lỗi này là network error (connect-failure)
    # Chỉ kích hoạt khi gửi header x-test-retry: true
    # ------------------------------------------------------------------
    - match:
        - headers:
            x-test-retry:
              exact: "true"
      route:
        - destination:
            host: tax
            port:
              number: 8888
      timeout: 5s
      retries:
        attempts: 3
        perTryTimeout: 500ms
        retryOn: "5xx,connect-failure,refused-stream,gateway-error,retriable-status-codes,503"

    # ------------------------------------------------------------------
    # PRODUCTION MODE — Retry mặc định cho tất cả traffic thông thường
    # ------------------------------------------------------------------
    - route:
        - destination:
            host: tax
            port:
              number: 80
      timeout: 5s
      retries:
        attempts: 3
        perTryTimeout: 500ms
        retryOn: "5xx,connect-failure,refused-stream,gateway-error,retriable-status-codes,401"
