apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: tax-retry-policy
  namespace: production
spec:
  hosts:
  - tax.production.svc.cluster.local
  http:
  - route:
    - destination:
        host: tax.production.svc.cluster.local
        port:
          number: 80

    # 💥 1. BƠM LỖI TIMEOUT: Ép trì hoãn kết nối 5 giây (vượt quá 500ms timeout của mỗi lượt gọi)
    fault:
      delay:
        fixedDelay: 5s
        percentage:
          value: 100

    retries:
      attempts: 3          # 🔥 Ép Istio tự động thử lại 3 lần chạy ngầm
      perTryTimeout: 500ms # Thời gian chờ giữa mỗi lượt thử là 500ms
      retryOn: "5xx,connect-failure,refused-stream,gateway-error,retriable-status-codes"
      statusCodes:
      - 401