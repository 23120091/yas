apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: tax-retry-policy
  namespace: production
spec:
  hosts:
    - tax
  http:
    # ------------------------------------------------------------------
    # TEST MODE (đặt TRƯỚC production để Istio đánh giá trước)
    # Chỉ kích hoạt khi gửi header x-test-retry: true.
    # Production traffic không có header này sẽ rơi xuống block dưới.
    # ------------------------------------------------------------------
    - match:
        - headers:
            x-test-retry:
              exact: "true"
      route:
        - destination:
            host: tax
            port:
              number: 80
      fault:
        abort:
          percentage:
            value: 100
          httpStatus: 503
      timeout: 5s
      retries:
        attempts: 3
        perTryTimeout: 500ms
        retryOn: "5xx,connect-failure,refused-stream,gateway-error,retriable-status-codes,503"

    # ------------------------------------------------------------------
    # PRODUCTION MODE — Retry mặc định cho tất cả traffic thông thường
    # ------------------------------------------------------------------
    - route:
        - destination:
            host: tax
            port:
              number: 80
      timeout: 5s
      retries:
        attempts: 3
        perTryTimeout: 500ms
        retryOn: "5xx,connect-failure,refused-stream,gateway-error,retriable-status-codes,401"
