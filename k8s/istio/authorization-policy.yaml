apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: product-allow-callers
  namespace: production
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: product
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/production/sa/storefront-bff
              - cluster.local/ns/production/sa/backoffice-bff
              - cluster.local/ns/production/sa/order
              - cluster.local/ns/production/sa/search
              - cluster.local/ns/production/sa/cart
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: search-allow-callers
  namespace: production
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: search
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/production/sa/product
              - cluster.local/ns/production/sa/storefront-bff
              - cluster.local/ns/production/sa/backoffice-bff
