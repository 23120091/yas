# NOTE: Không tạo global DENY policy cho port 80. Trong Istio, DENY được
# đánh giá trước ALLOW, nên một DENY toàn namespace sẽ chặn cả các service đã
# có allow-list bên dưới. Với AuthorizationPolicy action ALLOW, traffic không
# match policy của workload sẽ tự động bị deny.
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-observability-stack-traffic
  namespace: production
spec:
  rules:
  - to:
    - operation:
        # Liệt kê đầy đủ các cổng hạ tầng giám sát:
        # - 8090: Cổng Spring Boot Actuator (Prometheus cào metric)
        # - 4317, 4318: Cổng OpenTelemetry Collector (Bắn Trace sang Tempo)
        # - 3100, 9096: Cổng Grafana Loki (Bắn và gom Logs hệ thống)
        ports: ["8090", "4317", "4318", "3100", "9096"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-storefront-bff
  namespace: production
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: storefront-bff
  rules:
    - to:
        - operation:
            ports: ["80"]
