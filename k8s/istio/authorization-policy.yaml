              - cluster.local/ns/staging/sa/order
              - cluster.local/ns/staging/sa/search
              - cluster.local/ns/staging/sa/cart
              - cluster.local/ns/staging/sa/rating
              - cluster.local/ns/staging/sa/recommendation
              - cluster.local/ns/staging/sa/sampledata
              - cluster.local/ns/istio-system/sa/istiod
      to:
        - operation:
            methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
            paths: ["/*"]
  selector:
    matchLabels:
      app.kubernetes.io/name: product
