# ĐẶC CÁCH 1: Cho phép Prometheus của hệ thống được vào cào dữ liệu qua cổng 8090
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-prometheus-metrics
  namespace: production
spec:
  rules:
  - to:
    - operation:
        ports: ["8090"]
        paths: ["/actuator/prometheus"]
    # Không giới hạn principal vì Prometheus thường chạy ở namespace ngoài mesh (monitoring)
    # Không đặt selector ở đây: selector.matchLabels không hỗ trợ nhiều giá trị
    # cho cùng key app.kubernetes.io/name.

---
# ĐẶC CÁCH 2: Mở đường cho luồng đi ra ngoài (Egress) để lấy thông tin OIDC Keycloak
# Tạo một ServiceEntry để Istio Mesh biết đường cho phép BFF gọi ra domain tthong.dev
apiVersion: networking.istio.io/v1alpha3
kind: ServiceEntry
metadata:
  name: allow-identity-external
  namespace: production
spec:
  hosts:
  - "identity.tthong.dev"
  ports:
  - number: 80
    name: http
    protocol: HTTP
  - number: 4443
    name: https
    protocol: HTTPS
  resolution: DNS
  location: MESH_EXTERNAL
