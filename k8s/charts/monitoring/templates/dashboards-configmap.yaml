apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    grafana_dashboard: "1"
data:
{{- range $path, $content := .Files.Glob "dashboards/*.json" }}
  {{ base (printf "%s" $path) }}: |
{{ printf "%s" $content | indent 4 }}
{{- end }}
