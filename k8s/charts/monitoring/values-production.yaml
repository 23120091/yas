prometheus:
  fullnameOverride: "prometheus-production-server"
  server:
    enabled: true
    retention: "30d"
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - prometheus-production.tthong.dev
      paths:
        - /
    nodeSelector:
      env: production          # Bind to dev worker node

  alertmanager:
    enabled: false

  nodeExporter:
    enabled: false    # K8s node metrics không cần cho app monitoring

  pushgateway:
    enabled: false

  serverFiles:
    prometheus.yml:
      scrape_configs:
        # Auto-discover Java services in dev namespace
        - job_name: 'kubernetes-pods-custom'
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names:
                  - production
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: true

            - source_labels: [__address__]
              action: replace
              regex: ([^:]+)(?::\d+)?
              replacement: $1:8090
              target_label: __address__
        
            - action: replace
              target_label: __metrics_path__
              replacement: /actuator/prometheus 
            
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod
              
grafana:
  enabled: false
  deploymentStrategy:
    type: Recreate
  replicas: 0
  service:
    enabled: false
  ingress:
    enabled: false
