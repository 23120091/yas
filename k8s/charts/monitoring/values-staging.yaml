prometheus:
  fullnameOverride: "prometheus-staging-server"
  server:
    enabled: true
    retention: "7d"
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - prometheus-staging.tthong.dev
      paths:
        - /
    nodeSelector:
      env: staging          # Bind to dev worker node

  alertmanager:
    enabled: false

  nodeExporter:
    enabled: false    # K8s node metrics không cần cho app monitoring

  pushgateway:
    enabled: false

  serverFiles:
    prometheus.yml:
      scrape_configs:
        # Auto-discover Java services in dev namespace
        - job_name: 'kubernetes-pods'
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names:
                  - staging
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              target_label: __address__
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
              # Simplified: scrape tất cả pod có port 8090 (metric port)
            - source_labels: [__meta_kubernetes_pod_container_port_number]
              action: keep
              regex: "8090"
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod
              