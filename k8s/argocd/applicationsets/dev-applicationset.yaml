# ============================================================================
# ARGOCD APPLICATIONSET — DEV ENVIRONMENT
# ============================================================================
# Generates ONE ArgoCD Application per YAS microservice for the DEV namespace.
#
# UPDATE STRATEGY (dev only):
#   Push to main → CI builds & pushes image tagged "dev-<sha>" → ArgoCD Image
#   Updater polls GHCR every 2min, detects new tag → overrides Helm parameter
#   backend.image.tag → ArgoCD auto-syncs → new pod rolls out.
#   CI NEVER touches git for dev — zero commit loop risk.
#
# Each Application declares Image Updater annotations telling it:
#   - Which registry to poll
#   - Which Helm parameter to override (image repo + tag path)
#   - Tag filter: only "dev-*" tags
#   - Write-back: "argocd" (internal state only, no git commit)
# ============================================================================

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: yas-dev
  namespace: argocd
  labels:
    env: dev
    team: yas
spec:
  generators:
    - list:
        elements:
          # --- BACKEND SERVICES (helmPrefix: backend) ---
          - {service: "product",        directory: "k8s/charts/product",        helmPrefix: "backend"}
          - {service: "cart",           directory: "k8s/charts/cart",           helmPrefix: "backend"}
          - {service: "order",          directory: "k8s/charts/order",          helmPrefix: "backend"}
          - {service: "payment",        directory: "k8s/charts/payment",        helmPrefix: "backend"}
          - {service: "payment-paypal", directory: "k8s/charts/payment-paypal", helmPrefix: "backend"}
          - {service: "customer",       directory: "k8s/charts/customer",       helmPrefix: "backend"}
          - {service: "inventory",      directory: "k8s/charts/inventory",      helmPrefix: "backend"}
          - {service: "location",       directory: "k8s/charts/location",       helmPrefix: "backend"}
          - {service: "media",          directory: "k8s/charts/media",          helmPrefix: "backend"}
          - {service: "tax",            directory: "k8s/charts/tax",            helmPrefix: "backend"}
          - {service: "promotion",      directory: "k8s/charts/promotion",      helmPrefix: "backend"}
          - {service: "rating",         directory: "k8s/charts/rating",         helmPrefix: "backend"}
          - {service: "search",         directory: "k8s/charts/search",         helmPrefix: "backend"}
          - {service: "recommendation", directory: "k8s/charts/recommendation", helmPrefix: "backend"}
          - {service: "sampledata",     directory: "k8s/charts/sampledata",     helmPrefix: "backend"}
          - {service: "webhook",        directory: "k8s/charts/webhook",        helmPrefix: "backend"}
          - {service: "storefront-bff", directory: "k8s/charts/storefront-bff", helmPrefix: "backend"}
          - {service: "backoffice-bff", directory: "k8s/charts/backoffice-bff", helmPrefix: "backend"}

          # --- UI SERVICES (helmPrefix: ui, image repo differs from service name) ---
          - {service: "storefront-ui",  directory: "k8s/charts/storefront-ui",  helmPrefix: "ui", imageName: "storefront"}
          - {service: "backoffice-ui",  directory: "k8s/charts/backoffice-ui",  helmPrefix: "ui", imageName: "backoffice"}

  template:
    metadata:
      name: "{{service}}-dev"
      labels:
        env: dev
        service: "{{service}}"
        team: yas
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        # --- ARGOCD IMAGE UPDATER ANNOTATIONS ---
        #
        # image-list:  Declare which images this Application uses.
        #              Format: <alias>=<full-registry-path>
        #              Alias matches the service name; used in the annotation keys below.
        argocd-image-updater.argoproj.io/image-list: >-
          {{service}}=ghcr.io/23120091/{{if index . "imageName"}}{{imageName}}{{else}}{{service}}{{end}}

        # update-strategy: newest-build → pick the most recently pushed tag by build timestamp.
        # Best for dev: no semver parsing needed, latest dev-abc123 gets picked immediately.
        argocd-image-updater.argoproj.io/{{service}}.update-strategy: newest-build

        # allow-tags: Only accept tags matching "dev-*".
        # Prevents accidentally picking "latest", "v1.2.3", or tags from other envs.
        argocd-image-updater.argoproj.io/{{service}}.allow-tags: regexp:^dev-.*

        # helm.image-name: Path to the image repository field in the Helm values.
        #   Backend services use: backend.image.repository
        #   UI services use:      ui.image.repository
        argocd-image-updater.argoproj.io/{{service}}.helm.image-name: "{{helmPrefix}}.image.repository"

        # helm.image-tag: Path to the image tag field in the Helm values.
        argocd-image-updater.argoproj.io/{{service}}.helm.image-tag: "{{helmPrefix}}.image.tag"

        # write-back-method: argocd → only write to ArgoCD internal parameter state.
        # Does NOT commit to git → fast, no CI loop risk.
        # If Application is refreshed, value reverts to git (tag: latest), but
        # Image Updater detects and updates again on the next poll cycle (2min).
        argocd-image-updater.argoproj.io/write-back-method: argocd

        # force-update: Uncomment to force re-deploy on the same tag (e.g., restart all pods).
        # argocd-image-updater.argoproj.io/force-update: "true"

    spec:
      project: yas
      source:
        repoURL: https://github.com/23120091/yas
        targetRevision: main
        path: "{{directory}}"
        helm:
          valueFiles:
            - "../../env/dev/common-values.yaml"
            - "../../env/dev/{{service}}-values.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: dev
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: true
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - PrunePropagationPolicy=foreground
