# ============================================================================
# ARGOCD APPLICATIONSET — DEV ENVIRONMENT
# ============================================================================
# Generates ONE ArgoCD Application per YAS microservice for the DEV namespace.
#
# UPDATE STRATEGY (dev only):
#   Push to main → CI builds & pushes image tagged "dev-<sha>" → ArgoCD Image
#   Updater polls GHCR every 2min, detects new tag → overrides Helm parameter
#   backend.image.tag → ArgoCD auto-syncs → new pod rolls out.
#   CI NEVER touches git for dev — zero commit loop risk.
#
# SYNC WAVES (sequential deployment to avoid CPU thrashing on small servers):
#   Wave 0: yas-config (credentials + configmaps) — deployed manually first
#   Wave 1: Core backend services (product, customer, cart)
#   Wave 2: Secondary backend services (inventory, location, media, tax, etc.)
#   Wave 3: Payment & integration services
#   Wave 4: Edge/BFF services
#   Wave 5: UI services
#
#   ArgoCD deploys lower waves first, waits for all pods in that wave to be
#   Healthy before starting the next wave. This prevents 20 Spring Boot apps
#   from starting simultaneously and overwhelming a 4 vCPU server.
#
#   Assign waves using the "wave" field in each list element.
#
# Each Application declares Image Updater annotations telling it:
#   - Which registry to poll
#   - Which Helm parameter to override (image repo + tag path)
#   - Tag filter: only "dev-*" tags
#   - Write-back: "argocd" (internal state only, no git commit)
# ============================================================================

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: yas-dev
  namespace: argocd
  labels:
    env: dev
    team: yas
spec:
  generators:
    - list:
        elements:
          # --- WAVE 1: Core backend services (start first, others depend on them) ---
          - {service: "product",        directory: "k8s/charts/product",        helmPrefix: "backend", wave: "1"}
          - {service: "customer",       directory: "k8s/charts/customer",       helmPrefix: "backend", wave: "1"}
          - {service: "cart",           directory: "k8s/charts/cart",           helmPrefix: "backend", wave: "1"}

          # --- WAVE 2: Secondary backend services ---
          - {service: "inventory",      directory: "k8s/charts/inventory",      helmPrefix: "backend", wave: "2"}
          - {service: "location",       directory: "k8s/charts/location",       helmPrefix: "backend", wave: "2"}
          - {service: "media",          directory: "k8s/charts/media",          helmPrefix: "backend", wave: "2"}
          - {service: "tax",            directory: "k8s/charts/tax",            helmPrefix: "backend", wave: "2"}
          - {service: "promotion",      directory: "k8s/charts/promotion",      helmPrefix: "backend", wave: "2"}
          - {service: "rating",         directory: "k8s/charts/rating",         helmPrefix: "backend", wave: "2"}
          - {service: "search",         directory: "k8s/charts/search",         helmPrefix: "backend", wave: "2"}
          - {service: "recommendation", directory: "k8s/charts/recommendation", helmPrefix: "backend", wave: "2"}
          - {service: "sampledata",     directory: "k8s/charts/sampledata",     helmPrefix: "backend", wave: "2"}
          - {service: "order",          directory: "k8s/charts/order",          helmPrefix: "backend", wave: "2"}

          # --- WAVE 3: Payment & integration services ---
          - {service: "payment",        directory: "k8s/charts/payment",        helmPrefix: "backend", wave: "3"}
          - {service: "payment-paypal", directory: "k8s/charts/payment-paypal", helmPrefix: "backend", wave: "3"}
          - {service: "webhook",        directory: "k8s/charts/webhook",        helmPrefix: "backend", wave: "3"}

          # --- WAVE 4: Edge/BFF services (gateway, depends on backend) ---
          - {service: "storefront-bff", directory: "k8s/charts/storefront-bff", helmPrefix: "backend", wave: "4"}
          - {service: "backoffice-bff", directory: "k8s/charts/backoffice-bff", helmPrefix: "backend", wave: "4"}

          # --- WAVE 5: UI services (start last, depend on BFF) ---
          - {service: "storefront-ui",  directory: "k8s/charts/storefront-ui",  helmPrefix: "ui", imageName: "storefront",  wave: "5"}
          - {service: "backoffice-ui",  directory: "k8s/charts/backoffice-ui",  helmPrefix: "ui", imageName: "backoffice",  wave: "5"}

  template:
    metadata:
      name: "{{service}}-dev"
      labels:
        env: dev
        service: "{{service}}"
        team: yas
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        # --- SYNC WAVE ---
        # ArgoCD deploys lower waves first, waits for all pods in that wave
        # to be Healthy before starting the next wave. Prevents CPU thrashing
        # when 20 Spring Boot apps try to start simultaneously.
        argocd.argoproj.io/sync-wave: "{{wave}}"

        # --- ARGOCD IMAGE UPDATER ANNOTATIONS ---
        #
        # image-list:  Declare which images this Application uses.
        #              Format: <alias>=<full-registry-path>
        #              Alias matches the service name; used in the annotation keys below.
        argocd-image-updater.argoproj.io/image-list: >-
          {{service}}=ghcr.io/23120091/{{if index . "imageName"}}{{imageName}}{{else}}{{service}}{{end}}

        # update-strategy: digest → detects changes to mutable :latest tag by comparing
        # the actual image SHA256 digest. Works correctly with rolling tags.
        argocd-image-updater.argoproj.io/{{service}}.update-strategy: digest

        # allow-tags: Accept "latest" for dev environment.
        argocd-image-updater.argoproj.io/{{service}}.allow-tags: regexp:^latest$

        # helm.image-name: Path to the image repository field in the Helm values.
        #   Backend services use: backend.image.repository
        #   UI services use:      ui.image.repository
        argocd-image-updater.argoproj.io/{{service}}.helm.image-name: "{{helmPrefix}}.image.repository"

        # helm.image-tag: Path to the image tag field in the Helm values.
        argocd-image-updater.argoproj.io/{{service}}.helm.image-tag: "{{helmPrefix}}.image.tag"

        # write-back-method: argocd → only write to ArgoCD internal parameter state.
        # Does NOT commit to git → fast, no CI loop risk.
        # If Application is refreshed, value reverts to git (tag: latest), but
        # Image Updater detects and updates again on the next poll cycle (2min).
        argocd-image-updater.argoproj.io/write-back-method: argocd

        # force-update: Uncomment to force re-deploy on the same tag (e.g., restart all pods).
        # argocd-image-updater.argoproj.io/force-update: "true"

    spec:
      project: yas
      source:
        repoURL: https://github.com/23120091/yas
        targetRevision: main
        path: "{{directory}}"
        helm:
          valueFiles:
            - "../../env/dev/common-values.yaml"
            - "../../env/dev/{{service}}-values.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: dev
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: true
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - PrunePropagationPolicy=foreground
