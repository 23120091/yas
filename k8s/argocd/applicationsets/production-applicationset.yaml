# ============================================================================
# ARGOCD APPLICATIONSET — PRODUCTION ENVIRONMENT
# ============================================================================
# Generates ONE ArgoCD Application per YAS microservice for PRODUCTION namespace.
#
# UPDATE STRATEGY (production):
#   workflow_dispatch triggered manually → CI edits production values files
#   → commits to git with [skip-ci] → ArgoCD detects git change
#   → Application becomes "OutOfSync" (because syncPolicy: {} — NO auto-sync)
#   → APPROVER opens ArgoCD Web UI → clicks "Sync" → deploy to production
#
# The manual sync gate ensures:
#   - Human approval before production changes
#   - Deploy during maintenance windows
#   - Rollback by reverting the git commit + manual sync
#
# SYNC WAVES (sequential deployment to avoid CPU thrashing):
#   Wave 1: Core backend services (product, customer, cart)
#   Wave 2: Secondary backend services (inventory, location, media, tax, etc.)
#   Wave 3: Payment & integration services
#   Wave 4: Edge/BFF services
#   Wave 5: UI services
# ============================================================================

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: yas-production
  namespace: argocd
  labels:
    env: production
    team: yas
spec:
  generators:
    - list:
        elements:
          # --- WAVE 1: Core backend services (start first, others depend on them) ---
          - {service: "product",        directory: "k8s/charts/product",        wave: "1"}
          - {service: "customer",       directory: "k8s/charts/customer",       wave: "1"}
          - {service: "cart",           directory: "k8s/charts/cart",           wave: "1"}

          # --- WAVE 2: Secondary backend services ---
          - {service: "inventory",      directory: "k8s/charts/inventory",      wave: "2"}
          - {service: "location",       directory: "k8s/charts/location",       wave: "2"}
          - {service: "media",          directory: "k8s/charts/media",          wave: "2"}
          - {service: "tax",            directory: "k8s/charts/tax",            wave: "2"}
          - {service: "promotion",      directory: "k8s/charts/promotion",      wave: "2"}
          - {service: "rating",         directory: "k8s/charts/rating",         wave: "2"}
          - {service: "search",         directory: "k8s/charts/search",         wave: "2"}
          - {service: "recommendation", directory: "k8s/charts/recommendation", wave: "2"}
          - {service: "sampledata",     directory: "k8s/charts/sampledata",     wave: "2"}
          - {service: "order",          directory: "k8s/charts/order",          wave: "2"}

          # --- WAVE 3: Payment & integration services ---
          - {service: "payment",        directory: "k8s/charts/payment",        wave: "3"}
          - {service: "payment-paypal", directory: "k8s/charts/payment-paypal", wave: "3"}
          - {service: "webhook",        directory: "k8s/charts/webhook",        wave: "3"}

          # --- WAVE 4: Edge/BFF services (gateway, depends on backend) ---
          - {service: "storefront-bff", directory: "k8s/charts/storefront-bff", wave: "4"}
          - {service: "backoffice-bff", directory: "k8s/charts/backoffice-bff", wave: "4"}

          # --- WAVE 5: UI services (start last, depend on BFF) ---
          - {service: "storefront-ui",  directory: "k8s/charts/storefront-ui",  wave: "5"}
          - {service: "backoffice-ui",  directory: "k8s/charts/backoffice-ui",  wave: "5"}
          - {service: "swagger-ui",     directory: "k8s/charts/swagger-ui",     wave: "5"}

  template:
    metadata:
      name: "{{service}}-production"
      labels:
        env: production
        service: "{{service}}"
        team: yas
      annotations:
        argocd.argoproj.io/sync-wave: "{{wave}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io

    spec:
      project: yas
      source:
        repoURL: https://github.com/23120091/yas
        targetRevision: main
        path: "{{directory}}"
        helm:
          valueFiles:
            - "../../env/production/common-values.yaml"
            - "../../env/production/{{service}}-values.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: production

      # --- MANUAL SYNC ONLY ---
      # syncPolicy: {} means ArgoCD will NEVER auto-deploy.
      # The Application shows "OutOfSync" in the Web UI.
      # A human must explicitly click "Sync" to deploy to production.
      syncPolicy: 
        syncOptions:
          - CreateNamespace=true
