apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kiali-server
  namespace: argocd
spec:
  project: yas
  sources:
    - repoURL: https://kiali.github.io/helm-charts
      chart: kiali-server
      targetRevision: 1.85.x
      helm:
        values: |
          auth:
            strategy: anonymous
          deployment:
            accessible_namespaces:
              - "**"
    - repoURL: https://github.com/23120091/yas
      targetRevision: main
      path: k8s/istio
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true