# ============================================================================
# ARGOCD APPLICATIONSET — SEALED SECRETS CONFIGURATION
# ============================================================================
# Manages the deployment of SealedSecret resources across all environments.
# These encrypted secrets are decrypted by the Sealed Secrets controller inside
# the cluster and turned into standard Kubernetes secrets before any config or app wave.
#
# SYNC WAVE: -3 (deploys BEFORE configuration at wave -1 and applications at wave 1+)
# ============================================================================

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: sealed-secrets-config
  namespace: argocd
  labels:
    service: sealed-secrets-config
    team: yas
spec:
  generators:
    - list:
        elements:
          - {env: "dev", namespace: "dev", syncWave: "-3"}
          - {env: "staging", namespace: "staging", syncWave: "-3"}
          - {env: "production", namespace: "production", syncWave: "-3"}
          - {env: "shared", namespace: "argocd", syncWave: "-3"}
  template:
    metadata:
      name: "sealed-secrets-{{env}}"
      labels:
        env: "{{env}}"
        service: sealed-secrets-config
        team: yas
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        # Deploy BEFORE configuration (wave -3)
        argocd.argoproj.io/sync-wave: "{{syncWave}}"
    spec:
      project: yas
      source:
        repoURL: https://github.com/23120091/yas
        targetRevision: main
        path: "k8s/sealed-secrets/{{env}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: true
        syncOptions:
          - CreateNamespace=true
